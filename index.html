{id:749,n:"Good Neighbours — Live at Flex",dt:"2026-03-08",c:"concert",v:"Flex",p:"€22–28",desc:{en:"UK indie-pop duo Good Neighbours at Flex! Viral sensation behind 'Home' — anthemic melodies, uplifting energy & one of 2025's breakout acts. Infectious feel-good vibes.",de:"UK Indie-Pop-Duo Good Neighbours im Flex! Virale Sensation hinter 'Home' — hymnische Melodien & einer der Durchbruchsacts 2025. Ansteckende Feel-Good-Vibes."},u:"flex.at",t:["concert","indie","pop","british","viral","flex"]},
{id:750,n:"Remy Bond — Live at B72",dt:"2026-03-12",c:"concert",v:"B72",p:"€12–15",desc:{en:"Indie artist Remy Bond at B72. Fresh indie sounds & intimate performance in one of Vienna's most beloved small venues.",de:"Indie-Künstler Remy Bond im B72. Frischer Indie-Sound & intime Performance in einem von Wiens beliebtesten kleinen Venues."},u:"b72.at",t:["concert","indie","b72"]},
{id:751,n:"The World Famous Glenn Miller Orchestra",dt:"2026-03-17",c:"classical",v:"Wiener Konzerthaus (Großer Saal)",p:"€45–75",desc:{en:"🎺 The legendary Glenn Miller Orchestra at Konzerthaus! Swing classics like 'In the Mood', 'Moonlight Serenade', 'Chattanooga Choo Choo' & 'A String of Pearls'. The biggest touring big band in the world keeps the swing era alive.",de:"🎺 Das legendäre Glenn Miller Orchestra im Konzerthaus! Swing-Klassiker wie 'In the Mood', 'Moonlight Serenade', 'Chattanooga Choo Choo'. Die größte tourende Big Band der Welt hält die Swing-Ära am Leben."},u:"konzerthaus.at",t:["classical","jazz","swing","big band","american","konzerthaus"]},
{id:752,n:"Davido — Live at Gasometer",dt:"2026-03-25",c:"concert",v:"Gasometer",p:"€40–55",desc:{en:"🔥 MASSIVE! Nigerian Afrobeats global superstar Davido at Gasometer! One of Africa's biggest musical exports — 'Fall', 'If', 'Assurance', 'Unavailable'. Explosive energy, massive production & worldwide hits. A cultural phenomenon.",de:"🔥 RIESIG! Nigerianischer Afrobeats-Weltstar Davido im Gasometer! Einer von Afrikas größten Musikexporten — 'Fall', 'If', 'Assurance', 'Unavailable'. Explosive Energie & weltweite Hits."},u:"gasometer.at",t:["concert","afrobeats","nigerian","african","pop","gasometer"]},
{id:753,n:"Sarah Connor — Live at Stadthalle",dt:"2026-03-28",c:"concert",v:"Wiener Stadthalle (Halle D)",p:"€50–75",desc:{en:"🌟 German pop megastar Sarah Connor at Stadthalle! One of Germany's biggest and most beloved artists — 'From Sarah with Love', 'Wie Schön Du Bist', 'Vincent'. Powerhouse vocals & massive arena show.",de:"🌟 Deutsche Pop-Megastar Sarah Connor in der Stadthalle! Eine der größten und beliebtesten deutschen Künstlerinnen — 'From Sarah with Love', 'Wie Schön Du Bist', 'Vincent'. Kraftvolle Stimme & große Arena-Show."},u:"stadthalle.com",t:["concert","pop","german","schlager","stadthalle"]},
{id:754,n:"Ryan Oakes — Live at Arena Wien",dt:"2026-03-31",c:"concert",v:"Arena Wien",p:"€22–28",desc:{en:"American rapper/singer Ryan Oakes at Arena Wien. Genre-blending hip-hop fusing rap, pop-punk & emo influences. Known for energetic live shows & a dedicated online following.",de:"Amerikanischer Rapper/Sänger Ryan Oakes in der Arena Wien. Genre-übergreifender Hip-Hop mit Rap, Pop-Punk & Emo-Einflüssen. Bekannt für energische Live-Shows."},u:"arena.wien",t:["concert","hip-hop","rap","pop-punk","american","arena"]},
{id:755,n:"LaBrassBanda — Live at Arena Wien",dt:"2026-03-09",c:"concert",v:"Arena Wien",p:"€30–38",desc:{en:"Bavarian brass band sensation LaBrassBanda at Arena Wien! The Chiemgau boys fuse traditional Bavarian brass with techno, reggae & rock into an irresistible party machine. Barefoot on stage, non-stop energy — their unique 'BrassTechno' sound has conquered festivals across Europe. Expect lederhosen, trumpet solos & crowd surfing!",de:"Bayerische Brass-Sensation LaBrassBanda in der Arena Wien! Die Chiemgauer Jungs verschmelzen traditionelle bayerische Blasmusik mit Techno, Reggae & Rock zu einer unwiderstehlichen Partymaschine. Barfuß auf der Bühne, Non-Stop-Energie!"},u:"arena.wien",t:["concert","brass","bavarian","folk","techno","party","german","arena"]},
{id:756,n:"Shawn James — Live at WUK",dt:"2026-03-10",c:"concert",v:"WUK",p:"€22–28",desc:{en:"American blues/folk singer Shawn James at WUK. A towering voice channeling the deep blues tradition — raw, spiritual & intensely powerful. His song 'Through the Valley' (featured in The Last of Us Part II) went viral. Acoustic storytelling at its most visceral.",de:"Amerikanischer Blues/Folk-Sänger Shawn James im WUK. Eine gewaltige Stimme in der tiefen Blues-Tradition — roh, spirituell & intensiv kraftvoll. Sein Song 'Through the Valley' (bekannt aus The Last of Us Part II) wurde viral."},u:"wuk.at",t:["concert","blues","folk","americana","singer-songwriter","american","wuk"]},
{id:757,n:"Dead Pioneers — Live at Arena Wien",dt:"2026-03-11",c:"concert",v:"Arena Wien",p:"€15–20",desc:{en:"Dead Pioneers at Arena Wien! Raw punk rock with a rebellious spirit. Aggressive guitars, pounding drums & in-your-face energy — classic punk attitude alive and kicking in Vienna's best underground venue.",de:"Dead Pioneers in der Arena Wien! Roher Punkrock mit rebellischem Geist. Aggressive Gitarren, hämmernde Drums & In-Your-Face-Energie im besten Underground-Venue Wiens."},u:"arena.wien",t:["concert","punk","rock","arena","underground"]},
{id:758,n:"Kikuo — Vienna Debut at Flex",dt:"2026-03-13",c:"concert",v:"Flex",p:"€25–35",desc:{en:"Japanese Vocaloid producer & musician Kikuo makes his Vienna debut at Flex! Known for hauntingly beautiful yet unsettling electronic compositions using Hatsune Miku vocals, Kikuo blends J-pop, experimental & darkwave elements. A cult figure in the Vocaloid community with millions of views worldwide. Doors 20:00.",de:"Japanischer Vocaloid-Produzent & Musiker Kikuo gibt sein Wien-Debüt im Flex! Bekannt für eindringlich schöne und zugleich verstörende elektronische Kompositionen mit Hatsune Miku. Eine Kultfigur der Vocaloid-Community mit Millionen von Aufrufen."},u:"flex.at",t:["concert","electronic","japanese","vocaloid","experimental","j-pop","flex"]},
{id:759,n:"JID — Live at Gasometer",dt:"2026-03-13",c:"concert",v:"Raiffeisen Halle, Gasometer",p:"€35–45",desc:{en:"Atlanta rapper JID (Destin Choice Route) at Gasometer! One of hip-hop's most acclaimed lyricists — signed to J. Cole's Dreamville label. Known for dizzying flows, intricate wordplay & albums 'DiCaprio 2' and 'The Forever Story'. A technically gifted MC at the top of his game.",de:"Atlanta-Rapper JID (Destin Choice Route) im Gasometer! Einer der gefeiertsten Lyriker des Hip-Hop — auf J. Coles Dreamville-Label. Bekannt für schwindelerregende Flows, komplexe Wortspiele & die Alben 'DiCaprio 2' und 'The Forever Story'."},u:"gasometer.at",t:["concert","hip-hop","rap","american","dreamville","gasometer"]},
{id:760,n:"PLK — Live at FLUCC",dt:"2026-03-14",c:"concert",v:"FLUCC",p:"€25–32",desc:{en:"French rapper PLK (Mathieu Music) at FLUCC! One of France's biggest rap stars with platinum albums 'Polak' & 'Enna'. Melodic French rap with infectious hooks, introspective lyrics & massive streaming numbers. A rare Vienna appearance for a French hip-hop heavyweight.",de:"Französischer Rapper PLK (Mathieu Music) im FLUCC! Einer der größten Rap-Stars Frankreichs mit Platin-Alben 'Polak' & 'Enna'. Melodischer French Rap mit eingängigen Hooks & introspektiven Texten."},u:"flucc.at",t:["concert","hip-hop","rap","french","flucc"]},
{id:761,n:"Rokko Weissensee — Live at dasWERK",dt:"2026-03-14",c:"concert",v:"dasWERK",p:"€18–22",desc:{en:"German rapper Rokko Weissensee at dasWERK! Underground hip-hop from Berlin with distinctive flow, clever wordplay & boom-bap influenced beats. Raw, authentic & unapologetically independent.",de:"Deutscher Rapper Rokko Weissensee im dasWERK! Underground-Hip-Hop aus Berlin mit unverwechselbarem Flow, cleverem Wortspiel & Boom-Bap-beeinflussten Beats."},u:"daswerk.org",t:["concert","hip-hop","rap","german","underground","daswerk"]},
{id:762,n:"Maxïmo Park — Live at Arena Wien",dt:"2026-03-15",c:"concert",v:"Arena Wien",p:"€30–38",desc:{en:"British indie rock heroes Maxïmo Park return to Vienna! Paul Smith & band bring angular guitars, synth hooks & post-punk energy. Hits like 'Apply Some Pressure', 'Books from Boxes' & 'Our Velocity' from one of the UK's most consistent indie bands. 20+ years of sharp, intelligent rock.",de:"Britische Indie-Rock-Helden Maxïmo Park zurück in Wien! Paul Smith & Band bringen kantige Gitarren, Synth-Hooks & Post-Punk-Energie. Hits wie 'Apply Some Pressure' & 'Books from Boxes'."},u:"arena.wien",t:["concert","indie","rock","post-punk","british","arena"]},
{id:763,n:"MALUGI — Live at Ottakringer Brauerei",dt:"2026-03-15",c:"concert",v:"Ottakringer Brauerei",p:"€20–25",desc:{en:"Austrian artist MALUGI at Ottakringer Brauerei! Fresh sounds in the atmospheric setting of Vienna's iconic brewery venue. An intimate show combining music with the unique industrial-chic ambiance of the Ottakringer complex.",de:"Österreichischer Künstler MALUGI in der Ottakringer Brauerei! Frische Sounds im atmosphärischen Setting von Wiens ikonischer Brauerei-Location."},u:"ottakringerbrauerei.at",t:["concert","austrian","ottakringer","indie"]},
{id:764,n:"Del Water Gap — Live at Gasometer",dt:"2026-03-27",c:"concert",v:"Gasometer",p:"€25–32",desc:{en:"Brooklyn indie-pop artist Del Water Gap (S. Holden Jaffe) at Gasometer! Dreamy, emotionally resonant indie pop with lush production & heartfelt lyrics. Known for 'Ode to a Conversation Stuck in Your Throat' & viral TikTok moments. Warm, introspective songwriting meets expansive live arrangements.",de:"Brooklyn Indie-Pop-Künstler Del Water Gap (S. Holden Jaffe) im Gasometer! Verträumter, emotional resonanter Indie-Pop mit üppiger Produktion & herzlichen Texten."},u:"gasometer.at",t:["concert","indie","pop","american","singer-songwriter","gasometer"]},
{id:765,n:"Schur — Live at B72",dt:"2026-03-28",c:"concert",v:"B72",p:"€12–18",desc:{en:"Schur live at B72! Intimate show at Vienna's beloved underground club beneath the U-Bahn arches on the Hernalser Gürtel. Raw energy, close quarters & pure musical connection in one of the city's most atmospheric small venues.",de:"Schur live im B72! Intimshow in Wiens beliebtem Underground-Club unter den U-Bahn-Bögen am Hernalser Gürtel."},u:"b72.at",t:["concert","b72","underground","indie"]},
{id:766,n:"SINN6R — Live at Flex",dt:"2026-03-28",c:"concert",v:"Flex",p:"€18–25",desc:{en:"SINN6R at Flex! Dark, atmospheric sounds at Vienna's iconic Donaukanal venue. An evening of intense, moody music in one of the city's most legendary clubs.",de:"SINN6R im Flex! Dunkle, atmosphärische Sounds in Wiens ikonischem Donaukanal-Venue."},u:"flex.at",t:["concert","flex","electronic","dark"]},
{id:767,n:"Antifuchs — Live at dasWERK",dt:"2026-03-29",c:"concert",v:"dasWERK",p:"€20–25",desc:{en:"German rapper Antifuchs at dasWERK! One of the most distinctive female voices in German hip-hop. Fierce lyrics, sharp wit & unapologetic attitude. Known for clever wordplay, feminist themes & a no-nonsense delivery that commands the stage.",de:"Deutsche Rapperin Antifuchs im dasWERK! Eine der markantesten weiblichen Stimmen im deutschen Hip-Hop. Scharfe Texte, Witz & kompromisslose Attitüde."},u:"daswerk.org",t:["concert","hip-hop","rap","german","female","daswerk"]},
{id:768,n:"Unsane — Live at Arena Wien",dt:"2026-03-25",c:"concert",v:"Arena Wien",p:"€25–30",desc:{en:"NYC noise rock legends Unsane at Arena Wien! Since 1988, Chris Spencer's trio has defined the genre with crushing, feedback-drenched riffs & visceral intensity. 'Scattered, Smothered & Covered' remains a noise rock landmark. Raw, punishing & relentless.",de:"New Yorker Noise-Rock-Legenden Unsane in der Arena Wien! Seit 1988 definiert Chris Spencers Trio das Genre mit zerdrückenden, feedback-getränkten Riffs & viszeraler Intensität."},u:"arena.wien",t:["concert","noise-rock","punk","hardcore","american","arena"]},
{id:769,n:"No Money Kids — Live at Arena Wien",dt:"2026-03-30",c:"concert",v:"Arena Wien",p:"€18–24",desc:{en:"French blues-rock duo No Money Kids at Arena Wien! Félix Music & Music bring raw, stripped-down garage blues with haunting vocals & fuzz-soaked guitar. Dark, atmospheric & deeply cool — Black Keys meets Jack White in a Parisian alley.",de:"Französisches Blues-Rock-Duo No Money Kids in der Arena Wien! Roher, reduzierter Garage-Blues mit eindringlichen Vocals & Fuzz-Gitarre. Dunkel, atmosphärisch & zutiefst cool."},u:"arena.wien",t:["concert","blues-rock","garage","french","arena"]},
{id:770,n:"Karate Andi — Live at FLUCC",dt:"2026-03-25",c:"concert",v:"FLUCC",p:"€22–28",desc:{en:"Berlin rapper Karate Andi at FLUCC! Underground Deutschrap with dark humor, street narratives & hard-hitting beats. Associated with the Trailerpark & Alles Oder Nix crew. Unapologetic, raw hip-hop with cult following.",de:"Berliner Rapper Karate Andi im FLUCC! Underground-Deutschrap mit dunklem Humor, Straßen-Narrativen & harten Beats. Assoziiert mit der Trailerpark & Alles Oder Nix Crew."},u:"flucc.at",t:["concert","hip-hop","rap","german","underground","flucc"]},
{id:771,n:"Elias Rønnenfelt — Solo at Chelsea",dt:"2026-03-28",c:"concert",v:"Chelsea",p:"€20–26",desc:{en:"Iceage frontman Elias Rønnenfelt performs solo at Chelsea! The Danish post-punk icon strips back to intimate acoustic/electronic territory. Raw vulnerability from one of punk's most compelling voices — expect haunting reinterpretations & new solo material.",de:"Iceage-Frontmann Elias Rønnenfelt solo im Chelsea! Der dänische Post-Punk-Ikone in intimem akustisch/elektronischem Setting. Rohe Verletzlichkeit von einer der fesselndsten Stimmen des Punk."},u:"chelsea.co.at",t:["concert","post-punk","solo","danish","indie","chelsea"]},
{id:772,n:"World Peace — Live at Arena Wien",dt:"2026-03-28",c:"concert",v:"Arena Wien",p:"€18–22",desc:{en:"Punk band World Peace at Arena Wien! High-energy punk with urgent political messaging & razor-sharp guitars. Fast, loud & socially conscious — DIY punk at its finest.",de:"Punk-Band World Peace in der Arena Wien! High-Energy-Punk mit dringlicher politischer Botschaft & messerscharfen Gitarren. Schnell, laut & sozialkritisch."},u:"arena.wien",t:["concert","punk","hardcore","political","arena"]},
{id:773,n:"Harriet Tubman — Electrical Field of Love",dt:"2026-03-21",c:"concert",v:"Porgy & Bess",p:"€22–28",desc:{en:"Avant-jazz supergroup Harriet Tubman at Porgy & Bess! Brandon Ross (guitar), Melvin Gibbs (bass) & JT Lewis (drums) present 'Electrical Field of Love' — free jazz meets rock, funk & experimental soundscapes. Named after the legendary abolitionist, their music is equally liberating & boundary-breaking.",de:"Avant-Jazz-Supergroup Harriet Tubman im Porgy & Bess! Brandon Ross, Melvin Gibbs & JT Lewis präsentieren 'Electrical Field of Love' — Free Jazz trifft Rock, Funk & experimentelle Klanglandschaften."},u:"porgy.at",t:["concert","jazz","avant-garde","experimental","free-jazz","american","porgy"]},
{id:774,n:"Ibrahim Maalouf — Live at Konzerthaus",dt:"2026-03-25",c:"concert",v:"Konzerthaus",p:"€35–55",desc:{en:"French-Lebanese jazz trumpet virtuoso Ibrahim Maalouf at Konzerthaus! A unique voice blending Western jazz, classical & Arabic quarter-tone traditions. Multiple Victoires de la Musique winner. Emotional, technically dazzling & culturally bridging — world-class jazz.",de:"Französisch-libanesischer Jazz-Trompeten-Virtuose Ibrahim Maalouf im Konzerthaus! Eine einzigartige Stimme zwischen westlichem Jazz, Klassik & arabischer Vierteltontradition. Emotional, technisch brillant & kulturell verbindend."},u:"konzerthaus.at",t:["concert","jazz","world","trumpet","french","lebanese","classical","konzerthaus"]},
{id:775,n:"The Hobknobs + Vic Velvet + The Velvet Swing — FLUCC Live Night",dt:"2026-03-05",c:"concert",v:"FLUCC",p:"€12–16",desc:{en:"Triple-bill live night at FLUCC! The Hobknobs, Vic Velvet & The Velvet Swing deliver an eclectic evening of indie rock, retro-swing & garage vibes. A perfect discovery night for fans of Vienna's underground live scene.",de:"Triple-Bill Live-Nacht im FLUCC! The Hobknobs, Vic Velvet & The Velvet Swing bieten einen eklektischen Abend mit Indie-Rock, Retro-Swing & Garage-Vibes. Perfekter Entdeckungsabend."},u:"flucc.at",t:["concert","indie","rock","swing","garage","flucc","local"]},
{id:776,n:"Alex von Schlippenbach/Barry Altschul Quartet — Free Jazz at Porgy & Bess",dt:"2026-03-20",c:"concert",v:"Porgy & Bess",p:"€22–28",desc:{en:"Free jazz legends at Porgy & Bess! German pianist Alex von Schlippenbach (Globe Unity Orchestra founder) joins American drummer Barry Altschul with Rudi Mahall (bass clarinet) & Joe Fonda (bass). Four masters of improvisation in explosive, boundary-dissolving free jazz. A rare and essential concert.",de:"Free-Jazz-Legenden im Porgy & Bess! Der deutsche Pianist Alex von Schlippenbach (Globe Unity Orchestra) trifft den amerikanischen Schlagzeuger Barry Altschul mit Rudi Mahall & Joe Fonda. Vier Meister der Improvisation."},u:"porgy.at",t:["concert","jazz","free-jazz","avant-garde","improvisation","porgy"]},
{id:777,n:"Tash Sultana — Live at Wiener Stadthalle",dt:"2026-03-18",c:"concert",v:"Wiener Stadthalle",p:"€45–65",desc:{en:"Australian multi-instrumentalist phenomenon Tash Sultana at Wiener Stadthalle! A one-person orchestra who loops guitar, bass, keys, drums, flute, saxophone & trumpet live to create hypnotic psych-rock/soul/funk soundscapes. Support from Jeremy Loops & South Summit. From busking in Melbourne to selling out arenas worldwide — a breathtaking live experience.",de:"Australisches Multi-Instrumentalisten-Phänomen Tash Sultana in der Wiener Stadthalle! Eine Ein-Personen-Band, die live Gitarre, Bass, Keys, Drums, Flöte, Saxophon & Trompete loopt. Support von Jeremy Loops & South Summit. Von der Straßenmusik in Melbourne zum Arena-Ausverkauf weltweit."},u:"stadthalle.com",t:["concert","rock","psych","soul","funk","loop","australian","stadthalle"]},
{id:778,n:"The Rumjacks — Celtic Punk at Flex",dt:"2026-03-24",c:"concert",v:"Flex",p:"€22–28",desc:{en:"Australian Celtic punk legends The Rumjacks at Flex! Combining Irish folk traditions with blistering punk energy — tin whistles, banjos & mandolins meet distorted guitars and mosh pits. Known for explosive live shows and anthemic singalongs. A riotous, sweaty, unforgettable night.",de:"Australische Celtic-Punk-Legenden The Rumjacks im Flex! Irische Folk-Traditionen mit brennender Punk-Energie — Tin Whistles, Banjos & Mandolinen treffen verzerrte Gitarren und Mosh Pits. Bekannt für explosive Live-Shows."},u:"flex.at",t:["concert","punk","celtic","folk","australian","flex"]},
{id:779,n:"Peter McPoland — Live at Szene Wien",dt:"2026-03-29",c:"concert",v:"Szene Wien",p:"€22–28",desc:{en:"American indie singer-songwriter Peter McPoland at Szene Wien! The Texas-born artist blends indie rock, bedroom pop & folk into deeply personal, catchy songs. Viral success on social media with millions of streams. Young, authentic & emotionally resonant — a rising star of American indie.",de:"Amerikanischer Indie-Singer-Songwriter Peter McPoland in der Szene Wien! Der texanische Künstler verbindet Indie-Rock, Bedroom Pop & Folk zu tief persönlichen, eingängigen Songs. Viraler Erfolg mit Millionen von Streams."},u:"szenewien.com",t:["concert","indie","pop","folk","american","singer-songwriter","szene"]},
{id:780,n:"Azahriah — Live at Gasometer",dt:"2026-03-24",c:"concert",v:"Gasometer",p:"€30–45",desc:{en:"Hungarian pop-rap superstar Azahriah at the Gasometer! The 22-year-old phenomenon who broke every streaming record in Hungary — genre-blending pop, hip-hop, rock & electronic with magnetic stage presence. The biggest Hungarian music export in a generation. Massive following across Central Europe.",de:"Ungarischer Pop-Rap-Superstar Azahriah im Gasometer! Das 22-jährige Phänomen, das jeden Streaming-Rekord in Ungarn gebrochen hat — genreübergreifend Pop, Hip-Hop, Rock & Elektronik. Der größte ungarische Musikexport einer Generation."},u:"gasometer.at",t:["concert","pop","hip-hop","hungarian","rap","electronic","gasometer"]},
{id:781,n:"Villagers of Ioannina City — Stoner Rock at Szene Wien",dt:"2026-03-08",c:"concert",v:"Szene Wien",p:"€20–26",desc:{en:"Greek psychedelic/stoner rock band Villagers of Ioannina City (V.I.C.) at Szene Wien! Epic, heavy riffs fused with traditional Greek folk instruments like klarino & zournas. A unique blend of Balkan soul with heavy rock power. From the mountains of Epirus to stages worldwide — thunderous and deeply atmospheric.",de:"Griechische Psychedelic/Stoner-Rock-Band Villagers of Ioannina City (V.I.C.) in der Szene Wien! Epische, schwere Riffs verschmolzen mit traditionellen griechischen Volksinstrumenten wie Klarino & Zournas. Eine einzigartige Mischung aus Balkan-Seele und Heavy-Rock."},u:"szenewien.com",t:["concert","rock","stoner","psychedelic","greek","folk","szene"]},
{id:782,n:"FJØRT — Post-Hardcore at WUK",dt:"2026-03-13",c:"concert",v:"WUK",p:"€20–25",desc:{en:"German post-hardcore powerhouse FJØRT at WUK! The Aachen-based trio delivers emotionally intense, driving post-hardcore with screamed & sung vocals over angular, atmospheric riffs. Think La Dispute meets Refused. Raw urgency & cathartic energy — essential for fans of heavy, emotional music.",de:"Deutsches Post-Hardcore-Kraftpaket FJØRT im WUK! Das Aachener Trio liefert emotional intensiven, treibenden Post-Hardcore mit geschrienen & gesungenen Vocals über eckigen, atmosphärischen Riffs. Rohe Dringlichkeit & kathartische Energie."},u:"wuk.at",t:["concert","post-hardcore","punk","german","hardcore","wuk"]},
{id:783,n:"Manic Days — Punk at B72",dt:"2026-03-07",c:"concert",v:"B72",p:"€10–15",desc:{en:"Manic Days live at B72! High-energy punk rock from Vienna's underground scene. Fast riffs, shout-along choruses & raw DIY attitude — a perfect Saturday night in one of Vienna's best punk-friendly basement venues.",de:"Manic Days live im B72! Energiegeladener Punkrock aus Wiens Underground-Szene. Schnelle Riffs, Mitsing-Refrains & rohe DIY-Attitüde — perfekter Samstagabend in einem der besten Punk-Keller Wiens."},u:"b72.at",t:["concert","punk","rock","austrian","underground","b72"]},
{id:784,n:"Punk Rock Escalation 2026",dt:"2026-03-13",c:"concert",v:"Szene Wien",p:"€15–25",desc:{en:"Austria's hottest punk festival returns to Szene Wien! Punk Rock Escalation brings together the best of Austrian punk bands for one massive, sweaty, adrenaline-fuelled night. Multiple bands, all-night party energy & the kind of chaotic fun only a proper punk festival delivers.",de:"Österreichs heißestes Punk-Festival kehrt in die Szene Wien zurück! Punk Rock Escalation vereint die besten österreichischen Punkbands für eine massive, schweißtreibende, adrenalingeladene Nacht."},u:"szenewien.com",t:["concert","punk","festival","austrian","szene wien"]},
{id:785,n:"01099 — Extra aus Dresden angereist Tour",dt:"2026-03-14",c:"concert",v:"Raiffeisen Halle, Gasometer",p:"€64.99",desc:{en:"Dresden hip-hop phenomenon 01099 at Gasometer! Germany's hottest rap collective — known for their carefree, melodic style blending rap with indie-pop sensibilities. Their album 'orange' showcases infectious hooks & laid-back Dresden vibes. Massive in the DACH region and guaranteed to pack the house.",de:"Dresdner Hip-Hop-Phänomen 01099 im Gasometer! Deutschlands heißestes Rap-Kollektiv — bekannt für ihren unbeschwerten, melodischen Stil. Das Album 'orange' zeigt eingängige Hooks & entspannte Dresdner Vibes. Riesig im DACH-Raum."},u:"gasometer.at",t:["concert","hip-hop","rap","german","dresden","gasometer"]},
{id:786,n:"Rumours Of Fleetwood Mac — Live in Concert 2026",dt:"2026-03-16",c:"concert",v:"Raiffeisen Halle, Gasometer",p:"€45–65",desc:{en:"The world's finest Fleetwood Mac tribute at Gasometer! Rumours Of Fleetwood Mac deliver a stunning live recreation of the legendary band's greatest hits — from 'Dreams' and 'Go Your Own Way' to 'The Chain' and 'Everywhere'. Full band, incredible vocal harmonies & faithful arrangements that transport you to the golden era of 70s/80s rock.",de:"Das weltbeste Fleetwood-Mac-Tribute im Gasometer! Rumours Of Fleetwood Mac liefern eine atemberaubende Live-Nachstellung der größten Hits — von 'Dreams' über 'Go Your Own Way' bis 'The Chain'. Volle Band & unglaubliche Vokalharmonien."},u:"gasometer.at",t:["concert","rock","tribute","classic rock","fleetwood mac","gasometer"]},
{id:787,n:"Romano — Live at FLUCC",dt:"2026-03-18",c:"concert",v:"FLUCC",p:"€36.50",desc:{en:"German rap artist & entertainer Romano at FLUCC! The eccentric Berlin-based rapper/singer is known for his wild, genre-bending live shows mixing rap, chanson & absurdist humor. Think Falco meets Die Antwoord — confetti, fake money rains & total party chaos. A uniquely entertaining night.",de:"Deutscher Rap-Künstler & Entertainer Romano im FLUCC! Der exzentrische Berliner Rapper/Sänger ist bekannt für wilde, genreübergreifende Live-Shows mit Rap, Chanson & absurdem Humor. Konfetti, Geldregen & totales Party-Chaos."},u:"flucc.at",t:["concert","hip-hop","rap","german","berlin","flucc"]},
{id:788,n:"RoMero — Live at Flex",dt:"2026-03-19",c:"concert",v:"Flex",p:"€15–20",desc:{en:"RoMero brings genre-fluid hip-hop to Flex! Blending rap with R&B, electronic and pop influences, RoMero delivers polished, atmospheric tracks with introspective lyrics. An intimate Flex show perfect for discovering fresh sounds on Vienna's Donaukanal.",de:"RoMero bringt genreübergreifenden Hip-Hop ins Flex! Eine Mischung aus Rap mit R&B, Elektro- und Pop-Einflüssen. Atmosphärische Tracks mit introspektiven Texten in der intimen Flex-Atmosphäre am Donaukanal."},u:"flex.at",t:["concert","hip-hop","rap","flex"]},
{id:789,n:"Manntra — Titans Tour at Szene Wien",dt:"2026-03-20",c:"concert",v:"Szene Wien",p:"€20–28",desc:{en:"Croatian dark rock/metal powerhouse Manntra at Szene Wien! The Zagreb-based band combines heavy riffs with electronic elements, industrial beats & catchy melodies — think Rammstein meets The Prodigy with Balkan energy. Their theatrical, high-energy live shows are unforgettable.",de:"Kroatisches Dark-Rock/Metal-Kraftpaket Manntra in der Szene Wien! Die Zagreber Band kombiniert schwere Riffs mit elektronischen Elementen, Industrial-Beats & eingängigen Melodien. Theatralische, energiegeladene Live-Shows."},u:"szenewien.com",t:["concert","metal","dark rock","industrial","croatian","szene wien"]},
{id:790,n:"Hinterlandgang — Live at Das WERK",dt:"2026-03-20",c:"concert",v:"dasWERK",p:"€12–18",desc:{en:"German hip-hop collective Hinterlandgang at Das WERK! The crew brings authentic, unpolished rap from Germany's smaller towns — representing the 'Hinterland' (rural areas) with pride. Gritty beats, honest lyrics & a party atmosphere that's all about community over clout.",de:"Deutsches Hip-Hop-Kollektiv Hinterlandgang im Das WERK! Die Crew bringt authentischen, unpolierten Rap aus Deutschlands Kleinstädten — das 'Hinterland' mit Stolz repräsentierend. Rohe Beats & ehrliche Texte."},u:"daswerk.org",t:["concert","hip-hop","rap","german","underground","daswerk"]},
{id:791,n:"$ONO$ CLIQ — Live at Flex",dt:"2026-03-20",c:"concert",v:"Flex",p:"€15–20",desc:{en:"$ONO$ CLIQ at Flex! The hip-hop/R&B collective brings vibrant, genre-blending energy to Vienna's Donaukanal club. Expect smooth vocals layered over trap-influenced production with pop crossover appeal. A Friday night vibe that bridges underground and mainstream.",de:"$ONO$ CLIQ im Flex! Das Hip-Hop/R&B-Kollektiv bringt vibrierende, genreübergreifende Energie in Wiens Donaukanal-Club. Smooth Vocals über Trap-beeinflusste Produktion mit Pop-Crossover-Appeal."},u:"flex.at",t:["concert","hip-hop","r&b","flex"]},
{id:792,n:"He Ro — Tour 2026 at SIMM City",dt:"2026-03-21",c:"concert",v:"SIMM City",p:"€20–30",desc:{en:"German rapper He Ro at SIMM City! Rising star of German-language rap with melodic, introspective tracks that blend emotional storytelling with modern trap production. His authentic, heartfelt style has earned a devoted following in the DACH region.",de:"Deutscher Rapper He Ro in der SIMM City! Aufsteigender Star des deutschsprachigen Rap mit melodischen, introspektiven Tracks. Authentischer, herzlicher Stil mit einer treuen Fanbase im DACH-Raum."},u:"simmcity.at",t:["concert","hip-hop","rap","german","simm city"]},
{id:793,n:"Howard Carpendale — Live at Stadthalle",dt:"2026-03-22",c:"concert",v:"Wiener Stadthalle",p:"€55–95",desc:{en:"German schlager legend Howard Carpendale at Wiener Stadthalle! The South African-born, German-adopted superstar has been a pillar of German-language pop for over 50 years. Expect timeless hits like 'Ti Amo', 'Hello Again' & 'Dann geh doch' in a grand arena setting — an evening of pure nostalgia and showmanship.",de:"Schlager-Legende Howard Carpendale in der Wiener Stadthalle! Der in Südafrika geborene, in Deutschland adoptierte Superstar ist seit über 50 Jahren eine Säule des deutschsprachigen Pop. Zeitlose Hits in großer Arena — ein Abend voller Nostalgie und Showkunst."},u:"stadthalle.com",t:["concert","schlager","pop","german","classic","stadthalle"]},
{id:794,n:"Feuerschwanz — Knightclub Tour 2026",dt:"2026-03-26",c:"concert",v:"Raiffeisen Halle, Gasometer",p:"€45–75",desc:{en:"Germany's hottest folk metal export Feuerschwanz at Gasometer! The Knightclub Tour showcases their 12th album featuring guests Doro Pesch, Dag-Alexis Kopplin (SDP) & Lord of the Lost. From the Eurovision-tested title track to the epic 'Valhalla' and their wild cover of 'Gangnam Style' — expect a medieval metal party of epic proportions.",de:"Deutschlands heißester Folk-Metal-Export Feuerschwanz im Gasometer! Die Knightclub-Tour präsentiert ihr 12. Album mit Gästen Doro Pesch, SDP & Lord of the Lost. Vom Eurovision-Titelsong bis zum epischen 'Valhalla' — eine mittelalterliche Metal-Party epischen Ausmaßes."},u:"gasometer.at",t:["concert","folk metal","metal","german","medieval","gasometer"]},
{id:795,n:"Thomas Anders sings Modern Talking",dt:"2026-03-26",c:"concert",v:"Raiffeisen Halle, Gasometer",p:"€50–85",desc:{en:"Thomas Anders performs the Modern Talking songbook at Gasometer! One half of the legendary 80s duo that gave the world 'You're My Heart, You're My Soul', 'Cheri Cheri Lady' & 'Brother Louie'. Thomas Anders brings the iconic Eurodisco/synth-pop hits to life for a nostalgic, high-energy evening of pure 80s magic.",de:"Thomas Anders performt das Modern-Talking-Songbook im Gasometer! Eine Hälfte des legendären 80er-Duos bringt die ikonischen Eurodisco/Synth-Pop-Hits zum Leben — 'You're My Heart', 'Cheri Cheri Lady' & 'Brother Louie'. Ein nostalgischer, energiegeladener Abend voller 80er-Magie."},u:"gasometer.at",t:["concert","pop","80s","eurodisco","synth-pop","gasometer"]},
{id:796,n:"Dews Pegahorn — Live at B72",dt:"2026-03-26",c:"concert",v:"B72",p:"€10–15",desc:{en:"Dews Pegahorn at B72! Underground hip-hop energy in one of Vienna's finest basement venues. Expect raw bars, creative wordplay & the kind of intimate, up-close-and-personal show that makes B72 such a special spot for discovering emerging talent.",de:"Dews Pegahorn im B72! Underground-Hip-Hop-Energie in einem der besten Kellervenues Wiens. Rohe Bars, kreatives Wortspiel & die intime Atmosphäre, die B72 zum perfekten Ort für aufstrebende Talente macht."},u:"b72.at",t:["concert","hip-hop","rap","underground","b72"]},
{id:797,n:"Sophia — Durch die Blume Tour 2026",dt:"2026-03-30",c:"concert",v:"Raiffeisen Halle, Gasometer",p:"€35–55",desc:{en:"German pop sensation Sophia at Gasometer! Her 'Durch die Blume' Tour showcases the rising star's emotionally resonant pop songwriting — heartfelt lyrics delivered with a powerful voice that's earned massive streaming numbers and a devoted German-speaking fanbase. Arena-scale pop with intimate emotional depth.",de:"Deutsche Pop-Sensation Sophia im Gasometer! Die 'Durch die Blume'-Tour zeigt das emotional resonante Pop-Songwriting des aufsteigenden Stars. Herzliche Texte mit kraftvoller Stimme — Arena-Pop mit intimer emotionaler Tiefe."},u:"gasometer.at",t:["concert","pop","german","singer-songwriter","gasometer"]},
{id:798,n:"NICI — Live at Das LOT",dt:"2026-03-20",c:"concert",v:"Das LOT",p:"€15–22",desc:{en:"German rapper NICI at Das LOT! Part of the new wave of German-language rap bringing fresh perspectives and authentic storytelling. A Friday night hip-hop show in one of Vienna's newer live venues — perfect for fans who want to catch rising talent in an intimate setting.",de:"Deutscher Rapper NICI im Das LOT! Teil der neuen Welle des deutschsprachigen Rap mit frischen Perspektiven und authentischem Storytelling. Eine Hip-Hop-Show in einem der neueren Live-Venues Wiens."},u:"lot.wien",t:["concert","hip-hop","rap","german","das lot"]}

  if(S.df==='new')r=r.filter(function(e){var s=pd(e.dt);return s>=NOW&&s<=new Date(2026,1,18)&&!e.de});
  if(S.df==='ending')r=r.filter(function(e){if(!e.de)return false;var en=pd(e.de);return en>=NOW&&en<=new Date(2026,2,15)});
  if(S.q){var w=S.q.toLowerCase().split(/\s+/);r=r.map(function(e){var h=(e.n+' '+e.v+' '+(e.desc[S.lang]||e.desc.en)+' '+e.t.join(' ')+' '+e.c+' '+catL(e.c)).toLowerCase();var sc=0;w.forEach(function(x){if(x.length<2)return;if(h.indexOf(x)!==-1)sc+=10;if(e.n.toLowerCase().indexOf(x)!==-1)sc+=25;if(e.t.indexOf(x)!==-1)sc+=15});return{e:e,s:sc}}).filter(function(x){return x.s>0}).sort(function(a,b){return b.s-a.s}).map(function(x){return x.e})}
  else r.sort(function(a,b){return pd(a.dt)-pd(b.dt)});
  return r;
}

function render(){
  var r=filter();
  document.getElementById('rh').innerHTML='<strong>'+r.length+'</strong> '+tx('res')+(S.q?' — "'+ec(S.q)+'"':'');
  document.getElementById('upd').textContent=tx('upd');
  var h='';
  if(!r.length)h='<div class="empty"><div class="ic">🔍</div>'+tx('no')+'</div>';
  r.forEach(function(e){
    var ib=S.bk.indexOf(e.id)!==-1;
    h+='<div class="ec"><div class="ec-top">'+
      '<div class="ec-date">'+ddsp(e)+' '+dtag(e)+'</div>'+
      '<div class="ec-name">'+ec(e.n)+'</div>'+
      '<div class="ec-venue">📍 '+ec(e.v)+'</div>'+
      '<div class="ec-desc">'+ec(e.desc[S.lang]||e.desc.en)+'</div>'+
      '<div class="ec-meta"><span class="ec-tag ec-cat">'+catL(e.c)+'</span><span class="ec-tag ec-price">'+ec(e.p)+'</span></div>'+
      '</div><div class="ec-actions">'+
      '<a href="https://'+e.u+'" target="_blank">🔗 '+tx('info')+'</a>'+
      '<a href="'+gu(e.n)+'" target="_blank">🔍 Google</a>'+
      '<button class="ec-bk'+(ib?' saved':'')+'" onclick="tbk('+e.id+')">'+(ib?'★':'☆')+' '+tx('save')+'</button>'+
      '</div></div>';
  });
  var gq=S.q||(S.lang==='de'?'Events Wien Februar 2026':'events Vienna February 2026');
  h+='<div class="gb"><p>'+tx('more')+'</p><a href="'+gu(gq)+'" target="_blank" class="gbl">🔍 Google: '+ec(gq)+'</a></div>';
  document.getElementById('el').innerHTML=h;
}

function rf(){
  document.getElementById('dfs').innerHTML=DFS.map(function(d){return'<button class="db'+(S.df===d.id?' a':'')+'" onclick="sdf(\''+d.id+'\')">'+d.l[S.lang]+'</button>'}).join('');
  document.getElementById('cats').innerHTML=CATS.map(function(c){return'<button class="cb'+(S.cat===c.id?' a':'')+'" onclick="sct(\''+c.id+'\')">'+c.i+' '+c.l[S.lang]+'</button>'}).join('');
}
function sdf(id){S.df=id;rf();render();document.getElementById('mc').scrollTop=0}
function sct(id){S.cat=id;rf();render();document.getElementById('mc').scrollTop=0}
function doSearch(){S.q=document.getElementById('si').value.trim();S.df='all';S.cat='all';rf();render();document.getElementById('mc').scrollTop=0}
function tbk(id){var i=S.bk.indexOf(id);if(i!==-1)S.bk.splice(i,1);else S.bk.push(id);try{localStorage.setItem('wehbk4',JSON.stringify(S.bk))}catch(e){}render()}
function tl(){S.lang=S.lang==='en'?'de':'en';document.getElementById('lb').textContent=S.lang==='en'?'DE':'EN';document.getElementById('si').placeholder=tx('ph');rf();render();try{localStorage.setItem('weh4',JSON.stringify({d:S.dark,l:S.lang}))}catch(e){}}
function tth(){S.dark=!S.dark;document.body.classList.toggle('light',!S.dark);document.getElementById('thb').textContent=S.dark?'☀️':'🌙';try{localStorage.setItem('weh4',JSON.stringify({d:S.dark,l:S.lang}))}catch(e){}}
async function fw(){try{var r=await fetch('https://api.open-meteo.com/v1/forecast?latitude=48.2082&longitude=16.3738&current=temperature_2m,weather_code&timezone=Europe/Vienna');var d=await r.json();var t=Math.round(d.current.temperature_2m);var w={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'❄️',80:'🌦️',95:'⛈️'}[d.current.weather_code]||'';document.getElementById('wb').style.display='';document.getElementById('wb').textContent=w+' '+t+'°C'}catch(e){}}

// INIT
document.body.classList.toggle('light',!S.dark);
document.getElementById('thb').textContent=S.dark?'☀️':'🌙';
document.getElementById('si').placeholder=tx('ph');
document.getElementById('si').addEventListener('input',function(){S.q=this.value.trim();render()});
document.getElementById('si').addEventListener('keydown',function(e){if(e.key==='Enter'){e.preventDefault();doSearch()}});
rf();render();fw();
</script>
</body>
</html>
