{id:594,n:"VPO Chamber Music — Danzi, Milhaud, Götsch, Thuille",dt:"2026-02-21",c:"classical",v:"Gläserner Saal / Musikverein (Mahlersaal)",p:"€35–50",desc:{en:"Vienna Philharmonic musicians perform intimate chamber music at the Musikverein's Gläserner Saal: wind quintets and sextets by Danzi, Milhaud, Götsch, and Thuille. A rare chance to hear VPO players up close.",de:"Musiker der Wiener Philharmoniker spielen Kammermusik im Gläsernen Saal des Musikvereins: Bläserquintette und -sextette von Danzi, Milhaud, Götsch und Thuille. Seltene Gelegenheit, VPO-Musiker hautnah zu erleben."},u:"musikverein.at",t:["classical","chamber music","vpo","winds","musikverein"]},
{id:595,n:"Chalisée Naamani: Octogone",dt:"2026-01-29",de:"2026-04-06",c:"exhibition",v:"Kunsthalle Wien MQ",p:"€9",desc:{en:"French-Iranian artist Chalisée Naamani's first solo exhibition outside France. 'Octogone' presents new large-scale commissions — sculptural 'image-garments,' textiles, and installations exploring fashion as political language. At Kunsthalle Wien Museumsquartier.",de:"Erste Einzelausstellung der französisch-iranischen Künstlerin Chalisée Naamani außerhalb Frankreichs. 'Octogone' zeigt neue Großaufträge — skulpturale 'Image-Garments,' Textilien und Installationen. Mode als politische Sprache. Kunsthalle Wien MQ."},u:"kunsthallewien.at",t:["exhibition","contemporary art","fashion","textiles","sculptures","french-iranian","mq"]},
{id:596,n:"Regenerative Design — New Perspectives on Design Objects",dt:"2026-02-06",de:"2026-06-30",c:"exhibition",v:"MAK — Museum of Applied Arts",p:"€15",desc:{en:"MAK exhibition examining design objects through non-Global North perspectives. 'Regenerative Design' questions inherited value systems and explores how objects can be reimagined through Indigenous, ecological, and community-oriented frameworks.",de:"MAK-Ausstellung über Designobjekte aus nicht-westlichen Perspektiven. 'Regenerative Design' hinterfragt tradierte Wertesysteme und erforscht, wie Objekte durch indigene, ökologische und gemeinschaftsorientierte Ansätze neu gedacht werden können."},u:"mak.at",t:["exhibition","design","mak","sustainability","contemporary"]},
{id:597,n:"Modern Fashion 1900–1930 — Vienna and the Wiener Werkstätte",dt:"2026-02-26",de:"2027-06-27",c:"exhibition",v:"MAK — Museum of Applied Arts",p:"€15",desc:{en:"Major MAK exhibition on Vienna's revolutionary fashion scene 1900–1930. Explores the Wiener Werkstätte's radical textile and clothing designs, Emilie Flöge's reform dresses, and Vienna's role as a global fashion capital before WWII.",de:"Große MAK-Ausstellung über Wiens revolutionäre Modeszene 1900–1930. Wiener-Werkstätte-Textilien und Kleidungsdesigns, Emilie Flöges Reformkleider und Wiens Rolle als globale Modehauptstadt vor dem 2. Weltkrieg."},u:"mak.at",t:["exhibition","fashion","wiener werkstätte","vienna 1900","mak","art nouveau"]},
{id:598,n:"Felix Lenz: Soft Image, Brittle Grounds",dt:"2026-02-11",de:"2026-07-26",c:"exhibition",v:"MAK — Museum of Applied Arts",p:"€15",desc:{en:"Video and film installation by Felix Lenz at the MAK. 'Soft Image, Brittle Grounds' probes the fragility and mutability of digital images and their material underpinnings through immersive moving-image works.",de:"Video- und Filminstallation von Felix Lenz im MAK. 'Soft Image, Brittle Grounds' untersucht Fragilität und Wandelbarkeit digitaler Bilder und deren materielle Grundlagen in immersiven Bewegtbildarbeiten."},u:"mak.at",t:["exhibition","video art","film","digital art","mak","contemporary"]},
{id:599,n:"Richard Hawkins: Potentialities",dt:"2025-11-26",de:"2026-04-06",c:"exhibition",v:"Kunsthalle Wien MQ",p:"€9",desc:{en:"Los Angeles-based artist Richard Hawkins presents 'Potentialities' at Kunsthalle Wien: paintings, collages, and sculptural works that merge queer aesthetics with art-historical references. A career-spanning survey of a singular voice.",de:"Der in Los Angeles lebende Künstler Richard Hawkins zeigt 'Potentialities' in der Kunsthalle Wien: Gemälde, Collagen und Skulpturen zwischen queerer Ästhetik und kunsthistorischen Referenzen. Werkschau einer einzigartigen Stimme."},u:"kunsthallewien.at",t:["exhibition","contemporary art","painting","collage","queer","mq"]},
{id:600,n:"Sophie von Hellermann: Painting Exhibition",dt:"2025-10-08",de:"2026-03-29",c:"exhibition",v:"Kunsthalle Wien Karlsplatz",p:"€9",desc:{en:"German painter Sophie von Hellermann's large-scale works at Kunsthalle Wien Karlsplatz. Ethereal, dreamlike canvases drawing on literature, mythology, and everyday life in luminous washes of color.",de:"Großformatige Werke der deutschen Malerin Sophie von Hellermann in der Kunsthalle Wien Karlsplatz. Ätherische, traumhafte Leinwände zwischen Literatur, Mythologie und Alltag in leuchtenden Farbwäschen."},u:"kunsthallewien.at",t:["exhibition","painting","contemporary art","german","karlsplatz"]},
{id:601,n:"Toronto Symphony Orchestra — Bartók, Mahler",dt:"2026-02-09",c:"classical",v:"Wiener Konzerthaus, Großer Saal",p:"€25–95",desc:{en:"The Toronto Symphony Orchestra's European tour finale in Vienna! Music Director Gustavo Gimeno conducts Patricia Kopatchinskaja (violin) & Anna Prohaska (soprano). Program: Kelly-Marie Murphy's 'Curiosity, Genius, and the Search for Petula Clark', Bartók Violin Concerto No. 1, Mahler Symphony No. 4.",de:"Europäisches Tour-Finale des Toronto Symphony Orchestra in Wien! Musikdirektor Gustavo Gimeno dirigiert Patricia Kopatchinskaja (Violine) & Anna Prohaska (Sopran). Programm: Kelly-Marie Murphy, Bartók Violinkonzert Nr. 1, Mahler Symphonie Nr. 4."},u:"konzerthaus.at",t:["classical","orchestra","bartok","mahler","canadian","international","violin","soprano"]},

{id:604,n:"RSO Wien: Fritz Lang — Die Nibelungen, Part 2 (Kriemhilds Rache)",dt:"2026-02-15",c:"classical",v:"Wiener Konzerthaus, Großer Saal",p:"€25–72",desc:{en:"🎬 FILM + LIVE ORCHESTRA! Fritz Lang's 'Die Nibelungen: Kriemhild's Revenge' (1924) with live orchestral score. ORF RSO Wien conducted by Frank Strobel. Part 2 concludes the epic saga of Siegfried, Kriemhild & Hagen. Late-Romantic, Wagnerian soundscapes!",de:"🎬 FILM + LIVE-ORCHESTER! Fritz Langs 'Kriemhilds Rache' (1924) mit Live-Orchestermusik. ORF RSO Wien unter Frank Strobel. Teil 2 vollendet die Saga um Siegfried, Kriemhild & Hagen. Spätromantische, wagnerianische Klangwelten!"},u:"konzerthaus.at",t:["classical","film","silent film","orchestra","german","cinema","rso","strobel"]},

{id:615,n:"Lukas Resetarits — GLÜCK",dt:"2026-02-06",c:"kabarett",v:"Stadtsaal",p:"from €36",desc:{en:"Austrian kabarett icon Lukas Resetarits with his 30th (!) program 'GLÜCK' (Happiness). A satirical, philosophical exploration of what happiness really means. Co-written with Kathrin Resetarits. A master of Viennese kabarett at his finest. 19:30.",de:"Kabarett-Ikone Lukas Resetarits mit seinem 30. (!) Programm 'GLÜCK'. Eine satirisch-philosophische Erkundung von Glück. Mitgeschrieben von Kathrin Resetarits. Ein Meister des Wiener Kabaretts. 19:30."},u:"stadtsaal.com",t:["kabarett","austrian","legend","satirical","viennese","stadtsaal"]},
{id:616,n:"Alex Kristan — 50 Shades of Schmäh",dt:"2026-02-10",de:"2026-02-25",c:"kabarett",v:"Globe Wien",p:"from €30",desc:{en:"Austria's master impressionist Alex Kristan turns 50 and celebrates with '50 Shades of Schmäh' — his weapon against aging is Viennese Schmäh! Multiple dates: Feb 10, 11, 12, 24, 25 at Globe Wien (19:30). Hilarious celebrity impersonations & razor-sharp wit.",de:"Österreichs Meister-Imitator Alex Kristan wird 50 und feiert mit '50 Shades of Schmäh' — seine Waffe gegen das Altern ist der Wiener Schmäh! Termine: 10., 11., 12., 24., 25. Feb im Globe Wien (19:30). Brillante Promi-Imitationen & messerscharfer Witz."},u:"alexkristan.at",t:["kabarett","comedy","impressions","austrian","schmäh","viennese","globe wien"]},
{id:617,n:"Elton John & Billy Joel Tribute — Mario Pecoraro",dt:"2026-02-11",c:"concert",v:"Das Vindobona",p:"from €39",desc:{en:"Charismatic pianist & singer Mario Pecoraro takes you on a musical journey through the worlds of Elton John & Billy Joel. An evening of emotions, memories & the finest pop songwriting ever. 19:30.",de:"Der charismatische Pianist & Sänger Mario Pecoraro nimmt Sie mit auf eine musikalische Reise durch die Welten von Elton John & Billy Joel. Ein Abend voller Emotionen & Erinnerungen. 19:30."},u:"vindobona.wien",t:["concert","tribute","piano","pop","elton john","billy joel","vindobona"]},
{id:618,n:"Haltbar-MILF — Lydia Prenner-Kasper",dt:"2026-02-12",c:"kabarett",v:"Globe Wien",p:"€25–35",desc:{en:"Lydia Prenner-Kasper's hilarious solo show 'Haltbar-MILF' at Globe Wien. Wickedly funny observations on motherhood, aging & staying relevant. One of Austria's sharpest female comedy voices.",de:"Lydia Prenner-Kaspers urkomische Solo-Show 'Haltbar-MILF' im Globe Wien. Bösartig lustige Beobachtungen über Mutterschaft, Altern & Relevant-Bleiben. Eine der schärfsten weiblichen Comedy-Stimmen Österreichs."},u:"globewien.at",t:["kabarett","comedy","austrian","female","solo","globe wien"]},
{id:619,n:"Burlesque Extravaganza — Valentine's Special",dt:"2026-02-13",de:"2026-02-14",c:"special",v:"Das Vindobona",p:"€54–119",desc:{en:"💕 VALENTINE'S SPECIAL! Cirque Rouge's extravagant burlesque show at Vindobona — dazzling dancers, breathtaking acrobatics & seductive performances. Feb 13 show only (€54), Feb 14 incl. dinner (€119). The perfect Valentine's date!",de:"💕 VALENTINSTAG-SPECIAL! Cirque Rouge's extravagante Burlesque-Show im Vindobona — glamouröse Tänzer:innen, atemberaubende Akrobatik & verführerische Performances. 13. Feb Show (€54), 14. Feb inkl. Dinner (€119). Das perfekte Valentins-Date!"},u:"vindobona.wien",t:["burlesque","valentine","special","cirque rouge","dinner","show","vindobona"]},
{id:620,n:"Gery Seidl — beziehungsWEISE",dt:"2026-02-14",c:"kabarett",v:"Globe Wien",p:"€25–35",desc:{en:"💕 Valentine's Day kabarett! Popular Austrian comedian Gery Seidl with 'beziehungsWEISE' — witty observations on relationships, love & the chaos of togetherness. Perfect Valentine's entertainment at Globe Wien.",de:"💕 Valentinstag-Kabarett! Gery Seidl mit 'beziehungsWEISE' — witzige Beobachtungen über Beziehungen, Liebe & das Chaos des Zusammenlebens. Perfekte Valentinstag-Unterhaltung im Globe Wien."},u:"globewien.at",t:["kabarett","comedy","austrian","valentine","relationships","globe wien"]},
{id:621,n:"Anna of the North — Live at dasWERK",dt:"2026-02-16",c:"concert",v:"dasWERK",p:"€20–30",desc:{en:"Norwegian synth-pop artist Anna of the North brings her dreamy, atmospheric sound to intimate dasWERK. Known for 'Someone' & 'Lovers'. Shimmering Scandinavian pop in one of Vienna's coolest small venues.",de:"Norwegische Synth-Pop-Künstlerin Anna of the North bringt ihren verträumten, atmosphärischen Sound ins intime dasWERK. Bekannt für 'Someone' & 'Lovers'. Schimmernder skandinavischer Pop."},u:"daswerk.org",t:["concert","pop","synthpop","norwegian","scandinavian","indie","electronic","daswerk"]},
{id:622,n:"Adriana Zartl — 50+ wie und geil",dt:"2026-02-18",c:"kabarett",v:"Das Vindobona",p:"from €20",desc:{en:"Austrian actress & comedienne Adriana Zartl celebrates turning 50 with her new solo show '50+ wie und geil' (50+ how and awesome). Hilarious, honest & life-affirming. 19:30 at Vindobona.",de:"Schauspielerin & Komödiantin Adriana Zartl feiert ihren 50er mit Solo-Show '50+ wie und geil'. Urkomisch, ehrlich & lebensfroh. 19:30 im Vindobona."},u:"vindobona.wien",t:["kabarett","comedy","austrian","female","solo","vindobona"]},
{id:623,n:"ILLUSIONEN — 100 Jahre Hildegard Knef",dt:"2026-02-19",c:"theater",v:"Das Vindobona",p:"from €25",desc:{en:"A tribute to the legendary Hildegard Knef on her 100th birthday! 'ILLUSIONEN' celebrates the iconic German actress, singer & author — from Hollywood to her unforgettable chansons. A literary-musical portrait at Vindobona. 19:30.",de:"Hommage an die legendäre Hildegard Knef zu ihrem 100. Geburtstag! 'ILLUSIONEN' feiert die ikonische Schauspielerin, Sängerin & Autorin — von Hollywood bis zu ihren unvergesslichen Chansons. Literarisch-musikalisches Porträt im Vindobona. 19:30."},u:"vindobona.wien",t:["theater","tribute","music","german","chanson","portrait","vindobona"]},
{id:624,n:"Maya Hakvoort — Der Soundtrack meines Lebens",dt:"2026-02-20",c:"concert",v:"Das Vindobona",p:"from €49",desc:{en:"Austrian musical superstar Maya Hakvoort (legendary 'Elisabeth' star) performs 'The Soundtrack of My Life' — a deeply personal concert journey through the songs that shaped her extraordinary career. Broadway, West End & Viennese musical theater. 19:30.",de:"Musical-Superstar Maya Hakvoort (legendärer 'Elisabeth'-Star) mit 'Der Soundtrack meines Lebens' — eine persönliche Konzertreise durch die Songs ihrer außergewöhnlichen Karriere. Broadway, West End & Wiener Musical. 19:30."},u:"vindobona.wien",t:["concert","musical","broadway","austrian","female","elisabeth","vindobona"]},
{id:625,n:"Cirque Rouge Maskenball",dt:"2026-02-21",c:"ball",v:"Palais Auersperg",p:"€45–80",desc:{en:"🎭 MASKED BALL! A ball like no other — Cirque Rouge transforms Palais Auersperg into a roaring 1920s wonderland! Live music, kabarett, dance performances, burlesque shows & more. Dress code: Gatsby glamour meets Venetian mystery. THE alternative ball of the season!",de:"🎭 MASKENBALL! Ein Ball der anderen Art — Cirque Rouge verwandelt das Palais Auersperg in ein rauschendes 1920er-Wunderland! Live-Musik, Kabarett, Tanzperformances, Burlesque-Shows & mehr. Dresscode: Gatsby-Glamour trifft venezianisches Mysterium. DER alternative Ball der Saison!"},u:"cirquerouge.at",t:["ball","maskenball","burlesque","1920s","gatsby","palais","party","dance","alternative"]},
{id:626,n:"Birgit Denk — Live at Vindobona",dt:"2026-02-23",c:"concert",v:"Das Vindobona",p:"from €29",desc:{en:"Viennese Mundart rock legend Birgit Denk live at Vindobona! Austria's queen of dialect rock with powerful vocals, sharp lyrics & infectious energy. Authentic Viennese music at its best.",de:"Wiener Mundart-Rock-Legende Birgit Denk live im Vindobona! Österreichs Königin des Dialekt-Rock mit kraftvoller Stimme, scharfen Texten & ansteckender Energie. Authentische Wiener Musik."},u:"vindobona.wien",t:["concert","rock","austrian","viennese","dialect","mundart","female","vindobona"]},
{id:627,n:"Dave & Jan — DAVE ON STAGE",dt:"2026-02-27",c:"kabarett",v:"Globe Wien",p:"€25–35",desc:{en:"Comedy duo Dave & Jan with 'DAVE ON STAGE' at Globe Wien. Rescheduled from November — now the wait is over! Physical comedy, sharp dialogue & absurd situations. 19:30.",de:"Comedy-Duo Dave & Jan mit 'DAVE ON STAGE' im Globe Wien. Vom November verschoben — jetzt ist es endlich soweit! Körperkomik, scharfe Dialoge & absurde Situationen. 19:30."},u:"globewien.at",t:["kabarett","comedy","duo","physical comedy","globe wien"]},
{id:628,n:"Burlesque Extravaganza",dt:"2026-02-28",c:"special",v:"Das Vindobona",p:"from €44",desc:{en:"Extravagant, dazzling burlesque dancers & breathtaking acrobatics — Cirque Rouge's signature Burlesque Extravaganza returns to close out February! A night of glamour, spectacle & seduction at Vindobona.",de:"Extravagante, schillernde Burlesque-Tänzer:innen & atemberaubende Akrobatik — Cirque Rouge's Burlesque Extravaganza zum Abschluss des Februars! Eine Nacht voller Glamour, Spektakel & Verführung im Vindobona."},u:"vindobona.wien",t:["burlesque","special","show","cirque rouge","acrobatics","vindobona"]},
{id:629,n:"Stuttgarter Philharmoniker — Chaminade, Brahms, Tchaikovsky",dt:"2026-02-05",c:"classical",v:"Musikverein, Großer Saal",p:"€30–90",desc:{en:"The Stuttgart Philharmonic performs a richly romantic program in the Golden Hall at 3:30pm. Chaminade's Concertino for Flute, Brahms's Double Concerto with soloists Jascha von der Goltz & Sarah Shin, and Tchaikovsky's symphonic masterwork. A stellar afternoon of orchestral brilliance.",de:"Die Stuttgarter Philharmoniker mit einem romantischen Programm im Großen Saal um 15:30. Chaminades Concertino für Flöte, Brahms' Doppelkonzert mit Jascha von der Goltz & Sarah Shin, und Tschaikowsky. Ein glanzvoller Orchesternachmittag."},u:"musikverein.at",t:["classical","orchestra","german","brahms","tchaikovsky","musikverein"]},
{id:630,n:"Klang nach Seide 2026 — Symphonie- & Filmmusikfest",dt:"2026-02-07",c:"classical",v:"Musikverein, Großer Saal",p:"€35–95",desc:{en:"✨ HIGHLIGHT! 'Sound of Silk' — International Symphonic & Film Music Festival in the Golden Hall at 3:30pm! Vienna Synchron Orchestra + Wiener Sängerknaben (Vienna Boys' Choir) perform sweeping orchestral film scores & symphonic works. A spectacular crossover event combining cinematic grandeur with classical tradition.",de:"✨ HIGHLIGHT! 'Klang nach Seide' — Internationales Symphonie- & Filmmusikfest im Großen Saal um 15:30! Vienna Synchron Orchestra + Wiener Sängerknaben mit orchestralen Filmmusiken & symphonischen Werken. Spektakuläres Crossover-Event."},u:"musikverein.at",t:["classical","film music","orchestra","wiener sängerknaben","boys choir","crossover","musikverein"]},
{id:631,n:"Concert for Lovers — Maestro Francisco Navarro Lara",dt:"2026-02-14",c:"classical",v:"Musikverein, Großer Saal",p:"€40–120",desc:{en:"💕 VALENTINE'S DAY in the Golden Hall! Maestro Francisco Navarro Lara conducts a romantic 'Concert for Lovers' at 7:30pm — sweeping orchestral love themes in the world's most beautiful concert hall. The ultimate Valentine's classical experience.",de:"💕 VALENTINSTAG im Goldenen Saal! Maestro Francisco Navarro Lara dirigiert ein romantisches 'Concert for Lovers' um 19:30 — orchestrale Liebesthemen in schönstem Konzertsaal der Welt. Das ultimative klassische Valentinstag-Erlebnis."},u:"musikverein.at",t:["classical","orchestra","valentine","romantic","musikverein"]},
{id:632,n:"WSTR — Europe 2026 Headline Tour",dt:"2026-02-14",c:"concert",v:"Arena Wien",p:"€25–29",desc:{en:"British pop-punk from Liverpool! WSTR bring their high-energy Europe 2026 Headline Tour to Arena Wien on Valentine's Day. Known for anthemic hooks, raw energy & albums like 'Red, Green or Inbetween' & 'Til the Wheels Fall Off'. Support: CF98. Doors 7pm.",de:"Britischer Pop-Punk aus Liverpool! WSTR bringen ihre Europe 2026 Headline Tour am Valentinstag in die Arena Wien. Bekannt für hymnische Hooks & rohe Energie. Support: CF98. Einlass 19:00."},u:"arena.wien",t:["concert","punk","pop-punk","british","tour","arena"]},
{id:633,n:"Singverein der Gesellschaft der Musikfreunde — Nacht & Morgenröte",dt:"2026-02-15",c:"classical",v:"Musikverein, Großer Saal",p:"€30–80",desc:{en:"A mesmerizing choral journey from night to dawn in the Golden Hall. The Singverein chorus under Johannes Prinz performs works by Brahms, Haydn, Fauré, Ligeti, Schubert, Debussy & Lauridsen. With Burgtheater actress Sylvie Rohrer as narrator. An extraordinary evening of voices & poetry.",de:"Eine fesselnde Chorreise von der Nacht zur Morgenröte im Goldenen Saal. Der Singverein unter Johannes Prinz mit Werken von Brahms, Haydn, Fauré, Ligeti, Schubert, Debussy & Lauridsen. Mit Burgtheater-Schauspielerin Sylvie Rohrer. Außergewöhnlicher Abend voller Stimmen & Poesie."},u:"musikverein.at",t:["classical","choral","choir","singverein","brahms","schubert","debussy","musikverein"]},
{id:634,n:"Tonkünstler-Orchester — Dvořák & Suk (Netopil / Steckel)",dt:"2026-02-21",de:"2026-02-22",c:"classical",v:"Musikverein, Großer Saal",p:"€25–75",desc:{en:"Tonkünstler-Orchester Niederösterreich with chief conductor Tomáš Netopil and cellist Julian Steckel. Program: Dvořák's Cello Concerto & Josef Suk's symphonic works. Two evenings of magnificent Czech Romantic repertoire in the Golden Hall. Feb 21 & 22.",de:"Tonkünstler-Orchester Niederösterreich mit Chefdirigent Tomáš Netopil und Cellist Julian Steckel. Programm: Dvořáks Cellokonzert & Josef Suks symphonische Werke. Zwei Abende tschechischer Romantik im Goldenen Saal. 21. & 22. Feb."},u:"musikverein.at",t:["classical","orchestra","czech","dvorak","cello","tonkünstler","musikverein"]},
{id:635,n:"Delta Sleep — Live 2026",dt:"2026-02-26",c:"concert",v:"Arena Wien (Kleine Halle)",p:"€20–25",desc:{en:"British math rock / post-hardcore four-piece Delta Sleep at Arena Wien's Kleine Halle. Intricate guitar work, shifting time signatures & infectious melodies. One of the UK's most exciting underground bands, drawing from emo, math rock & indie. A must for fans of technical, emotive rock.",de:"Britische Math-Rock/Post-Hardcore-Band Delta Sleep in der Kleinen Halle der Arena Wien. Ausgefeilte Gitarrenarbeit, wechselnde Taktarten & mitreißende Melodien. Eine der aufregendsten Underground-Bands Großbritanniens."},u:"arena.wien",t:["concert","math rock","post-hardcore","british","indie","arena"]},
{id:636,n:"Knorkator — Aller guten Dinge sind 30!",dt:"2026-02-27",c:"concert",v:"Arena Wien",p:"€45",desc:{en:"🤘 Germany's self-proclaimed 'most band in the world'! Knorkator celebrate 30 years of chaotic comedy-metal with their anniversary tour. Industrial metal meets absurdist humor — wild stage shows, explicit lyrics & surprisingly sophisticated musicianship. A Berlin institution since 1994. Doors 7pm.",de:"🤘 Deutschlands meiste Band der Welt! Knorkator feiern 30 Jahre chaotischen Comedy-Metal mit ihrer Jubiläumstour. Industrial Metal trifft absurden Humor — wilde Bühnenshows seit 1994. Einlass 19:00."},u:"arena.wien",t:["concert","metal","industrial","comedy","german","berlin","arena"]},
{id:637,n:"London Philharmonic / Karina Canellakis / Anne-Sophie Mutter",dt:"2026-02-28",c:"classical",v:"Musikverein, Großer Saal",p:"€60–200+",desc:{en:"🌟 UNMISSABLE! The London Philharmonic Orchestra with Music Director Karina Canellakis & violin legend Anne-Sophie Mutter in the Golden Hall at 7:30pm. Program: Sibelius (Pohjola's Daughter), Tchaikovsky (Violin Concerto) & Beethoven (Symphony No. 7). One of the most prestigious classical events of February — a world-class soloist in the world's most beautiful concert hall.",de:"🌟 NICHT VERPASSEN! London Philharmonic Orchestra mit Musikdirektorin Karina Canellakis & Geigenlegende Anne-Sophie Mutter im Goldenen Saal um 19:30. Programm: Sibelius, Tschaikowsky (Violinkonzert) & Beethoven (Sinfonie Nr. 7). Eines der prestigeträchtigsten Klassik-Events des Februars."},u:"musikverein.at",t:["classical","orchestra","violin","anne-sophie mutter","london philharmonic","beethoven","tchaikovsky","sibelius","musikverein"]},
{id:638,n:"Susanna Ridler & Wolfgang Seierl — Gert Jonke Tribute",dt:"2026-02-07",c:"jazz",v:"Porgy & Bess",p:"€20–28",desc:{en:"A tribute to Austrian literary icon Gert Jonke: vocalist Susanna Ridler & multi-instrumentalist Wolfgang Seierl weave spoken word, improvisation & avant-jazz into a spellbinding evening at Porgy & Bess.",de:"Hommage an den österreichischen Literatur-Ikone Gert Jonke: Sängerin Susanna Ridler & Multi-Instrumentalist Wolfgang Seierl verbinden Spoken Word, Improvisation & Avantgarde-Jazz im Porgy & Bess."},u:"porgy.at",t:["jazz","avant-garde","literature","austrian","porgy & bess"]},
{id:639,n:"Joe Abentung Trio feat. Matthew Halpin",dt:"2026-02-19",c:"jazz",v:"Porgy & Bess",p:"€18–25",desc:{en:"Austrian jazz guitarist Joe Abentung with his trio and special guest Matthew Halpin (saxophone). Modern jazz with groove, inventive harmony & lyrical improvisation at Vienna's top jazz venue.",de:"Österreichischer Jazz-Gitarrist Joe Abentung mit Trio und Spezialgast Matthew Halpin (Saxofon). Moderner Jazz mit Groove & lyrischer Improvisation im Porgy & Bess."},u:"porgy.at",t:["jazz","guitar","austrian","saxophone","porgy & bess"]},
{id:640,n:"Wolfgang Muthspiel — Solo / Duo / Trio",dt:"2026-02-27",c:"jazz",v:"Wiener Konzerthaus",p:"€25–45",desc:{en:"Austrian guitar master Wolfgang Muthspiel at Konzerthaus. One of Europe's most celebrated jazz guitarists, known for his ECM recordings & collaborations with Brad Mehldau & Brian Blade. Expect crystalline tone, sublime phrasing & deep musicality.",de:"Österreichischer Gitarrenmeister Wolfgang Muthspiel im Konzerthaus. Einer der gefeiertsten Jazzgitarristen Europas, bekannt für ECM-Aufnahmen & Zusammenarbeit mit Brad Mehldau & Brian Blade. Kristalliner Ton & tiefe Musikalität."},u:"konzerthaus.at",t:["jazz","guitar","ecm","austrian","konzerthaus"]},
{id:641,n:"WIKAM — Vienna International Art Fair",dt:"2026-02-28",de:"2026-03-08",c:"exhibition",v:"Palais Ferstel",p:"€12–15",desc:{en:"Vienna's prestigious international art fair returns to the stunning Palais Ferstel. WIKAM brings together top Austrian & international galleries showcasing fine art, antiques, design & jewelry across the opulent palace rooms. A must for collectors and art lovers. Feb 28 – Mar 8.",de:"Wiens prestigeträchtige internationale Kunstmesse im prachtvollen Palais Ferstel. WIKAM vereint österreichische & internationale Galerien mit Kunst, Antiquitäten, Design & Schmuck. Ein Muss für Sammler. 28. Feb – 8. Mär."},u:"wikam.at",t:["exhibition","art fair","antiques","galleries","design","palais ferstel"]},
{id:642,n:"Alfa Mist — Live at WUK",dt:"2026-03-01",c:"jazz",v:"WUK",p:"€30–35",desc:{en:"🔥 London's Alfa Mist brings his genre-defying blend of jazz, hip-hop & neo-soul to WUK. Self-taught pianist & producer whose albums 'Bring Backs' & 'Variables' earned critical acclaim. Cinematic soundscapes meet intimate piano moments — one of jazz's most exciting voices.",de:"🔥 Londons Alfa Mist bringt seinen genreübergreifenden Mix aus Jazz, Hip-Hop & Neo-Soul ins WUK. Autodidaktischer Pianist & Produzent mit gefeierten Alben. Filmische Klangwelten treffen auf intime Klaviermomente."},u:"wuk.at",t:["jazz","hip-hop","neo-soul","london","piano","wuk"]},
{id:643,n:"Kraftklub — Kein Nacht für Niemand Tour",dt:"2026-03-02",c:"concert",v:"Wiener Stadthalle",p:"€45–55",desc:{en:"German indie-rap sensation Kraftklub fills the Stadthalle! Chemnitz's finest bring anthemic indie rock meets German-language rap. Known for electrifying live shows & hits like 'Schüsse in die Luft' & 'Dein Lied'. Expect a crowd-surfing, sing-along spectacle.",de:"Deutsche Indie-Rap-Sensation Kraftklub füllt die Stadthalle! Anthemischer Indie-Rock trifft deutschen Rap aus Chemnitz. Bekannt für elektrisierende Live-Shows & Hits wie 'Schüsse in die Luft'. Ein Mitsing-Spektakel."},u:"stadthalle.com",t:["concert","indie","rap","german","stadthalle"]},
{id:644,n:"Francesca Tandoi Trio",dt:"2026-03-03",c:"jazz",v:"Porgy & Bess",p:"€18–25",desc:{en:"Italian jazz pianist Francesca Tandoi with her trio at Porgy & Bess. Known for her fluid bebop-inspired style & lyrical touch, Tandoi is one of the most exciting young pianists on the European jazz scene. Swing, soul & sophistication.",de:"Italienische Jazz-Pianistin Francesca Tandoi mit ihrem Trio im Porgy & Bess. Bekannt für ihren fließenden Bebop-inspirierten Stil. Eine der aufregendsten jungen Pianistinnen der europäischen Jazzszene."},u:"porgy.at",t:["jazz","piano","italian","bebop","porgy & bess"]},
{id:645,n:"Russ Millions — Live",dt:"2026-03-04",c:"concert",v:"Grelle Forelle",p:"€30–35",desc:{en:"UK drill & Afrobeats star Russ Millions hits Grelle Forelle! The British-Ugandan rapper behind the global smash 'Body' (ft. Tion Wayne) brings high-energy drill, dancehall & Afro-swing to Vienna's premier club venue.",de:"UK-Drill- & Afrobeats-Star Russ Millions in der Grellen Forelle! Der britisch-ugandische Rapper hinter dem Welthit 'Body' bringt energiegeladenen Drill & Dancehall nach Wien."},u:"grelleforelle.com",t:["concert","drill","afrobeats","uk","rap","grelle forelle"]},
{id:646,n:"Wu-Tang Clan — Live in Vienna",dt:"2026-03-06",c:"concert",v:"Wiener Stadthalle (Halle D)",p:"€55–75",desc:{en:"🐝 WU-TANG FOREVER! The legendary Staten Island hip-hop collective brings their raw, uncompromising sound to Stadthalle Halle D. RZA, Method Man, Ghostface Killah & the whole Clan. 'C.R.E.A.M.', '36 Chambers', 'Protect Ya Neck' — timeless hip-hop royalty live in Vienna.",de:"🐝 WU-TANG FOREVER! Das legendäre Hip-Hop-Kollektiv aus Staten Island in der Stadthalle Halle D. RZA, Method Man, Ghostface Killah & der ganze Clan. Zeitlose Hip-Hop-Könige live in Wien."},u:"stadthalle.com",t:["concert","hip-hop","rap","legendary","wu-tang","stadthalle"]},
{id:647,n:"Thundercat — Live at Gasometer",dt:"2026-03-06",c:"concert",v:"Gasometer",p:"€40–50",desc:{en:"🎸 Bass virtuoso Thundercat (Stephen Lee Bruner) brings his genre-bending fusion of jazz, funk, R&B & electronic to Gasometer. Grammy-winning collaborator with Kendrick Lamar, Flying Lotus & Kamasi Washington. Mind-bending bass runs, falsetto vocals & cosmic grooves.",de:"🎸 Bass-Virtuose Thundercat bringt seine genresprengende Fusion aus Jazz, Funk, R&B & Elektronik ins Gasometer. Grammy-Preisträger & Mitstreiter von Kendrick Lamar & Flying Lotus. Kosmische Grooves."},u:"gasometer.at",t:["concert","jazz","funk","bass","electronic","gasometer"]},
{id:648,n:"Max Richter — In a Landscape",dt:"2026-03-07",de:"2026-03-08",c:"classical",v:"Wiener Konzerthaus, Großer Saal",p:"€45–90",desc:{en:"🌟 Neoclassical composer Max Richter presents 'In a Landscape' — an immersive concert experience at Konzerthaus. Known for 'Sleep', 'The Blue Notebooks' & recomposed Vivaldi. Hauntingly beautiful piano & string textures. Two evenings: Mar 7 & 8.",de:"🌟 Neoklassik-Komponist Max Richter präsentiert 'In a Landscape' — ein immersives Konzerterlebnis im Konzerthaus. Bekannt für 'Sleep' & 'The Blue Notebooks'. Zwei Abende: 7. & 8. Mär."},u:"konzerthaus.at",t:["classical","neoclassical","piano","strings","ambient","konzerthaus"]},
{id:649,n:"Hooverphonic — Live at WUK",dt:"2026-03-07",c:"concert",v:"WUK",p:"€35–40",desc:{en:"Belgian trip-hop & dream-pop legends Hooverphonic at WUK. From '2Wicky' to 'Mad About You', the Antwerp group delivers lush orchestral pop, cinematic atmospheres & mesmerizing vocals. A truly unique live sound.",de:"Belgische Trip-Hop- & Dream-Pop-Legenden Hooverphonic im WUK. Von '2Wicky' bis 'Mad About You' — orchestraler Pop, filmische Atmosphären & fesselnder Gesang."},u:"wuk.at",t:["concert","trip-hop","dream-pop","belgian","wuk"]},
{id:650,n:"SCALE & PAINT — Model Building Exhibition",dt:"2026-03-07",de:"2026-03-08",c:"special",v:"Eventpyramide Vösendorf",p:"€10–14",desc:{en:"Austria's biggest model building exhibition! SCALE & PAINT at Eventpyramide Vösendorf: tabletop gaming, miniature painting, dioramas, model trains, military models & sci-fi figures. Workshops, competitions & vendor stands. A paradise for hobbyists. Mar 7–8.",de:"Österreichs größte Modellbau-Ausstellung! SCALE & PAINT: Tabletop, Miniaturmalerei, Dioramen, Modellbahnen & Sci-Fi-Figuren. Workshops, Wettbewerbe & Händlerstände. Ein Paradies für Hobbyisten. 7.–8. Mär."},u:"scaleandpaint.at",t:["special","model building","hobby","tabletop","exhibition"]},
{id:651,n:"Yung Hurn — Live at Gasometer",dt:"2026-03-08",c:"concert",v:"Gasometer",p:"€35–45",desc:{en:"Vienna's own Yung Hurn returns to Gasometer! The Austrian cloud-rap pioneer whose dreamy, Auto-Tuned style pioneered a whole new wave in German-language music. Hits like 'Nein', 'Bianco' & 'Ponny'. A local legend headlining his hometown.",de:"Wiens eigener Yung Hurn zurück im Gasometer! Der österreichische Cloud-Rap-Pionier, dessen verträumter Auto-Tune-Stil eine ganze Welle in der deutschsprachigen Musik auslöste. Lokale Legende in seiner Heimatstadt."},u:"gasometer.at",t:["concert","rap","cloud-rap","austrian","vienna","gasometer"]},
{id:652,n:"Starke Stimmen – Starke Frauen (International Women's Day)",dt:"2026-03-08",c:"special",v:"Globe Wien",p:"€25–40",desc:{en:"💜 International Women's Day celebration at Globe Wien! 'Starke Stimmen – Starke Frauen' (Strong Voices – Strong Women) showcases powerful female vocalists & artists in an uplifting evening of music, spoken word & empowerment.",de:"💜 Weltfrauentags-Feier im Globe Wien! 'Starke Stimmen – Starke Frauen' präsentiert kraftvolle Sängerinnen & Künstlerinnen in einem erhebenden Abend voller Musik, Spoken Word & Empowerment."},u:"globewien.at",t:["special","women's day","concert","female artists","globe wien"]},
{id:653,n:"Alex Kristan — 50 Shades of Schmäh (March)",dt:"2026-03-09",de:"2026-03-12",c:"kabarett",v:"Globe Wien",p:"from €30",desc:{en:"Austria's master impressionist Alex Kristan continues his 50th birthday celebration! '50 Shades of Schmäh' — celebrity impersonations, razor-sharp wit & pure Viennese Schmäh. March dates: 9 & 12 at Globe Wien (19:30).",de:"Meister-Imitator Alex Kristan feiert weiter seinen 50er! '50 Shades of Schmäh' — Promi-Imitationen & reiner Wiener Schmäh. März-Termine: 9. & 12. im Globe Wien (19:30)."},u:"alexkristan.at",t:["kabarett","comedy","impressions","austrian","schmäh","globe wien"]},
{id:654,n:"Michael Niavarani — Homo Idioticus 2.0 (March)",dt:"2026-03-10",de:"2026-03-13",c:"kabarett",v:"Globe Wien",p:"€30–45",desc:{en:"Austria's #1 comedian is back! Michael Niavarani with 'Homo Idioticus 2.0' at Globe Wien. Physical comedy, brilliant observations & irresistible charm. March dates: 10 & 13. Guaranteed laughs from the master.",de:"Österreichs Comedian Nr. 1 ist zurück! Michael Niavarani mit 'Homo Idioticus 2.0' im Globe Wien. Körperkomik & brillante Beobachtungen. März-Termine: 10. & 13. Lachgarantie."},u:"globewien.at",t:["kabarett","comedy","niavarani","globe wien"]},
{id:655,n:"Gernot Kulis — Ich kann nicht anders",dt:"2026-03-11",c:"kabarett",v:"Globe Wien",p:"€28–38",desc:{en:"Gernot Kulis with his new program 'Ich kann nicht anders' (I Can't Help It) at Globe Wien. Austria's Ö3 radio prankster brings his famous impressions, prank call highlights & live comedy. An evening of non-stop laughs.",de:"Gernot Kulis mit neuem Programm 'Ich kann nicht anders' im Globe Wien. Österreichs Ö3-Telefonscherz-König mit Imitationen, Telefonstreichen & Live-Comedy. Ein Abend voller Lacher."},u:"globewien.at",t:["kabarett","comedy","radio","austrian","globe wien"]},
{id:656,n:"Colosseum — Live at Porgy & Bess",dt:"2026-03-11",c:"jazz",v:"Porgy & Bess",p:"€25–35",desc:{en:"British jazz-rock legends Colosseum at Porgy & Bess! Founded in 1968, one of the pioneering bands of jazz-rock fusion. Powerful brass, Hammond organ grooves & fiery improvisation. A rare chance to see living legends of British progressive jazz.",de:"Britische Jazz-Rock-Legenden Colosseum im Porgy & Bess! 1968 gegründet, Pioniere der Jazz-Rock-Fusion. Kraftvolle Bläser, Hammond-Orgel & feurige Improvisation. Lebende Legenden des britischen Progressive Jazz."},u:"porgy.at",t:["jazz","jazz-rock","fusion","british","legendary","porgy & bess"]},
{id:657,n:"The Young Gods — Live at FLUCC",dt:"2026-03-12",c:"concert",v:"FLUCC",p:"€25–30",desc:{en:"Swiss industrial/post-punk pioneers The Young Gods at FLUCC! Formed in 1985, they revolutionized rock with sampled orchestras, fierce electronics & raw power. Influences on Nine Inch Nails, Ministry & David Bowie. Uncompromising sonic assault.",de:"Schweizer Industrial/Post-Punk-Pioniere The Young Gods im FLUCC! Seit 1985 revolutionierten sie Rock mit gesampelten Orchestern & roher Energie. Einfluss auf NIN, Ministry & Bowie."},u:"flucc.at",t:["concert","industrial","post-punk","swiss","electronic","flucc"]},
{id:658,n:"Extrawelt — Live at Grelle Forelle",dt:"2026-03-13",c:"concert",v:"Grelle Forelle",p:"€20–28",desc:{en:"Hamburg techno duo Extrawelt brings their hypnotic live set to Grelle Forelle. Known for deep, melodic techno with acid touches & relentless energy. A staple of the Cocoon & Traum Schallplatten labels. Pure dancefloor euphoria.",de:"Hamburger Techno-Duo Extrawelt mit hypnotischem Live-Set in der Grellen Forelle. Bekannt für tiefen, melodischen Techno mit Acid-Elementen. Pure Dancefloor-Euphorie."},u:"grelleforelle.com",t:["concert","techno","electronic","german","grelle forelle"]},
{id:659,n:"Pizzera & Jaus — Live at Globe Wien",dt:"2026-03-14",c:"concert",v:"Globe Wien",p:"€35–50",desc:{en:"🇦🇹 Austrian pop-comedy duo Pizzera & Jaus at Globe Wien! Paul Pizzera & Otto Jaus blend catchy pop songs with Viennese humor. Hits like 'jedermann' & 'Absurdistan' — the perfect mix of music & comedy that made them Austria's biggest live act.",de:"🇦🇹 Österreichisches Pop-Comedy-Duo Pizzera & Jaus im Globe Wien! Paul Pizzera & Otto Jaus verbinden eingängige Popsongs mit Wiener Humor. Hits wie 'jedermann' & 'Absurdistan' — Österreichs größter Live-Act."},u:"globewien.at",t:["concert","austrian","pop","comedy","globe wien"]},
{id:660,n:"Stefan Verra — Du zum SuperDu 2.0",dt:"2026-03-15",c:"kabarett",v:"Globe Wien",p:"€25–38",desc:{en:"Body language expert Stefan Verra with 'Du zum SuperDu 2.0' at Globe Wien. Austria's most entertaining communication guru decodes gestures, postures & micro-expressions with scientific precision & hilarious examples. Part comedy, part life coaching.",de:"Körpersprache-Experte Stefan Verra mit 'Du zum SuperDu 2.0' im Globe Wien. Österreichs unterhaltsamster Kommunikations-Guru entschlüsselt Gestik & Mimik — Teil Comedy, Teil Lebenscoaching."},u:"globewien.at",t:["kabarett","body language","communication","austrian","globe wien"]},
{id:661,n:"Portugal. The Man — Live at Gasometer",dt:"2026-03-17",c:"concert",v:"Gasometer",p:"€40–50",desc:{en:"Alaskan indie rock heroes Portugal. The Man at Gasometer! Grammy winners for 'Feel It Still', known for psychedelic rock, anthemic hooks & incredible live energy. From 'Evil Friends' to 'Woodstock', expect a euphoric, genre-blending set.",de:"Indie-Rock-Helden Portugal. The Man im Gasometer! Grammy-Gewinner für 'Feel It Still', bekannt für Psychedelic Rock & anthemische Hooks. Euphorisches, genreübergreifendes Konzert."},u:"gasometer.at",t:["concert","indie rock","psychedelic","american","grammy","gasometer"]},
{id:662,n:"Vienna Philharmonic — Zubin Mehta (Weber, Bruch, Dvořák)",dt:"2026-03-18",de:"2026-03-22",c:"classical",v:"Musikverein, Großer Saal",p:"€80–250+",desc:{en:"🌟 HIGHLIGHT! The Vienna Philharmonic with legendary maestro Zubin Mehta. Program: Weber (Overture 'Der Freischütz'), Bruch (Violin Concerto) & Dvořák (Symphony No. 9 'From the New World'). Four evenings: Mar 18, 19, 21, 22 in the Golden Hall. Unmissable orchestral grandeur.",de:"🌟 HIGHLIGHT! Wiener Philharmoniker mit Legende Zubin Mehta. Programm: Weber, Bruch (Violinkonzert) & Dvořák (Sinfonie Nr. 9 'Aus der Neuen Welt'). Vier Abende: 18., 19., 21., 22. Mär im Goldenen Saal."},u:"musikverein.at",t:["classical","orchestra","vienna philharmonic","mehta","dvorak","bruch","weber","musikverein"]},
{id:663,n:"Eichberger & Niemand — Kabarett-Abend",dt:"2026-03-19",c:"kabarett",v:"Vindobona",p:"€20–30",desc:{en:"Kabarett duo Eichberger & Niemand perform at the Vindobona. Sharp-witted Austrian humor, social commentary & spontaneous audience interaction. An intimate evening of Viennese comedy tradition in one of the city's coziest venues.",de:"Kabarett-Duo Eichberger & Niemand in der Vindobona. Scharfzüngiger österreichischer Humor & spontane Publikumsinteraktion. Wiener Kabarett-Tradition in einem der gemütlichsten Lokale der Stadt."},u:"vindobona.at",t:["kabarett","comedy","austrian","vindobona"]},
{id:664,n:"CITY DESIGNQUARTIER — Design Fair",dt:"2026-03-20",de:"2026-03-22",c:"special",v:"Palais Niederösterreich",p:"€10–14",desc:{en:"Vienna's premier design fair at the historic Palais Niederösterreich! CITY DESIGNQUARTIER brings together 100+ designers, architects & makers showcasing furniture, lighting, fashion, ceramics & innovation. Mar 20–22. Where creativity meets craftsmanship.",de:"Wiens führende Designmesse im historischen Palais Niederösterreich! CITY DESIGNQUARTIER vereint 100+ Designer, Architekten & Handwerker mit Möbeln, Mode, Keramik & Innovation. 20.–22. Mär."},u:"designquartier.at",t:["special","design","fair","architecture","fashion","furniture"]},
{id:665,n:"Vindobona Tap Dance Spring Highlight",dt:"2026-03-20",c:"dance",v:"Vindobona",p:"€18–28",desc:{en:"Spring tap dance spectacular at the Vindobona! Dynamic performances showcasing the art of rhythm tap — from classic Broadway style to contemporary fusion. A high-energy celebration of percussive dance.",de:"Frühlings-Stepptanz-Spektakel in der Vindobona! Dynamische Aufführungen von klassischem Broadway-Stil bis zeitgenössischer Fusion. Energiegeladene Feier des perkussiven Tanzes."},u:"vindobona.at",t:["dance","tap dance","spring","vindobona"]},
{id:666,n:"Opera Meets Rap — Vindobona",dt:"2026-03-21",c:"special",v:"Vindobona",p:"€20–30",desc:{en:"An explosive genre-crossing show at Vindobona: classically trained opera singers meet street-smart rappers! When Verdi collides with boom-bap, and Puccini meets punchlines. A unique fusion event bridging Vienna's high culture with urban beats.",de:"Eine explosive genreübergreifende Show in der Vindobona: Klassische Opernsänger treffen auf Rapper! Wenn Verdi auf Boom-Bap trifft. Ein einzigartiges Fusion-Event zwischen Hochkultur und urbanen Beats."},u:"vindobona.at",t:["special","opera","rap","fusion","crossover","vindobona"]},
{id:667,n:"Edith Piaf 110th Anniversary Tribute",dt:"2026-03-22",c:"concert",v:"Vindobona",p:"€22–32",desc:{en:"🌹 A tribute to the immortal Edith Piaf on her 110th birthday anniversary! 'La Vie en Rose', 'Non, je ne regrette rien', 'Milord' — the greatest chanson classics performed with passion & authenticity at the intimate Vindobona.",de:"🌹 Hommage an die unsterbliche Edith Piaf zu ihrem 110. Geburtstag! 'La Vie en Rose', 'Non, je ne regrette rien', 'Milord' — die größten Chanson-Klassiker leidenschaftlich in der intimen Vindobona."},u:"vindobona.at",t:["concert","chanson","french","tribute","piaf","vindobona"]},
{id:668,n:"Bugge Wesseltoft Special Trio",dt:"2026-03-23",c:"jazz",v:"Porgy & Bess",p:"€25–35",desc:{en:"Norwegian jazz pianist Bugge Wesseltoft with his Special Trio at Porgy & Bess. Pioneer of the 'New Conception of Jazz' movement, blending acoustic piano with electronics, ambient textures & Nordic cool. Deep, contemplative & boundary-pushing.",de:"Norwegischer Jazz-Pianist Bugge Wesseltoft mit seinem Special Trio im Porgy & Bess. Pionier der 'New Conception of Jazz', verbindet akustisches Klavier mit Elektronik & nordischer Coolness."},u:"porgy.at",t:["jazz","piano","electronic","norwegian","nordic","porgy & bess"]},
{id:669,n:"Aperitivo — Spring Festival",dt:"2026-03-24",de:"2026-03-25",c:"special",v:"MAK (Museum of Applied Arts)",p:"€8–12",desc:{en:"🍸 Aperitivo Spring Festival at the MAK! A vibrant celebration of Mediterranean lifestyle in Vienna: cocktails, spritz, live music, DJ sets & gourmet food stalls in the beautiful MAK courtyard & galleries. Welcome spring Italian-style!",de:"🍸 Aperitivo Frühlingsfest im MAK! Feier des mediterranen Lebensstils in Wien: Cocktails, Spritz, Live-Musik, DJ-Sets & Gourmet-Stände im schönen MAK-Innenhof. Frühling auf Italienisch!"},u:"mak.at",t:["special","food","drinks","festival","spring","italian","mak"]},
{id:670,n:"herman de vries — Carlone Contemporary",dt:"2026-03-26",de:"2026-09-13",c:"exhibition",v:"Upper Belvedere, Carlone Contemporary",p:"€16–18",desc:{en:"Dutch artist herman de vries (deliberately lowercase) at the Belvedere's Carlone Contemporary space. Nature-based art, found objects & philosophical reflections on our relationship with the natural world. A meditative, immersive experience. Mar 26 – Sep 13.",de:"Niederländischer Künstler herman de vries im Carlone Contemporary des Oberen Belvedere. Naturbasierte Kunst, Fundstücke & philosophische Reflexionen. Eine meditative, immersive Erfahrung. 26. Mär – 13. Sep."},u:"belvedere.at",t:["exhibition","nature","contemporary","dutch","belvedere"]},
{id:671,n:"Donauinsel — How Vienna Got Its Island",dt:"2026-03-26",de:"2026-08-30",c:"exhibition",v:"Wien Museum",p:"€0–12",desc:{en:"How did Vienna get its beloved Donauinsel? This Wien Museum exhibition tells the fascinating story of the Danube Island — from flood protection mega-project to Europe's biggest open-air party zone. Maps, photos, engineering marvels & social history. Mar 26 – Aug 30.",de:"Wie bekam Wien seine geliebte Donauinsel? Das Wien Museum erzählt die faszinierende Geschichte — vom Hochwasserschutz-Megaprojekt zur größten Open-Air-Partyzone Europas. Karten, Fotos & Sozialgeschichte. 26. Mär – 30. Aug."},u:"wienmuseum.at",t:["exhibition","history","donauinsel","danube","vienna","wien museum"]},
{id:672,n:"Animalia: On Animals and Humans",dt:"2026-03-27",de:"2026-08-30",c:"exhibition",v:"Heidi Horten Collection",p:"€15",desc:{en:"Fascinating exhibition exploring the relationship between animals & humans through art. 'Animalia' at the Heidi Horten Collection features works from Old Masters to contemporary art, examining how artists depict, celebrate & question our bond with the animal kingdom. Mar 27 – Aug 30.",de:"Faszinierende Ausstellung über die Beziehung zwischen Tieren & Menschen in der Kunst. 'Animalia' in der Heidi Horten Collection mit Werken von Alten Meistern bis Gegenwartskunst. 27. Mär – 30. Aug."},u:"heidihorten.com",t:["exhibition","animals","contemporary","art history","heidi horten"]},
{id:673,n:"Argus Bike Festival 2026",dt:"2026-03-28",de:"2026-03-29",c:"sports",v:"Marx Halle & Prater",p:"€5–12",desc:{en:"🚲 Vienna's biggest cycling festival! Argus Bike Festival at Marx Halle & Prater Hauptallee: bike exhibitions, test rides, cargo bike races, BMX shows, cycling fashion & sustainability talks. The kickoff to Vienna's cycling season. Mar 28–29.",de:"🚲 Wiens größtes Radfahrer-Festival! Argus Bike Festival in Marx Halle & Prater: Rad-Ausstellungen, Probefahrten, Lastenrad-Rennen, BMX-Shows & Nachhaltigkeits-Talks. Start der Wiener Radsaison. 28.–29. Mär."},u:"argusbikefestival.at",t:["sports","cycling","festival","sustainability","marx halle","prater"]},
{id:674,n:"Laurent Garnier — Zuckerwatt",dt:"2026-02-13",c:"concert",v:"Grelle Forelle",p:"€18–25",desc:{en:"🔥 LEGENDARY! French techno pioneer Laurent Garnier at Grelle Forelle's Zuckerwatt night. One of electronic music's most influential figures, known for genre-defining releases on F Communications & decades of groundbreaking DJ sets. A rare chance to see a true icon.",de:"🔥 LEGENDÄR! Französischer Techno-Pionier Laurent Garnier bei Zuckerwatt in der Grellen Forelle. Eine der einflussreichsten Figuren der elektronischen Musik. Seltene Chance, eine echte Ikone zu erleben."},u:"grelleforelle.com",t:["concert","techno","electronic","french","legendary","grelle forelle"]},
{id:675,n:"Patrick Mason — TURBO",dt:"2026-02-27",c:"concert",v:"Grelle Forelle",p:"€15–22",desc:{en:"Canadian DJ Patrick Mason brings his TURBO sound to Grelle Forelle. Known for driving techno and house, the Montreal-based artist delivers energetic dancefloor sessions.",de:"Kanadischer DJ Patrick Mason mit seinem TURBO-Sound in der Grellen Forelle. Bekannt für treibenden Techno und House aus Montreal."},u:"grelleforelle.com",t:["concert","techno","house","canadian","grelle forelle"]},
{id:676,n:"Kadebostany — World Tour 2026",dt:"2026-03-12",c:"concert",v:"Grelle Forelle",p:"€25–32",desc:{en:"Swiss electropop collective Kadebostany at Grelle Forelle! Known for theatrical performances & hits like 'Castle in the Snow' & 'Mind If I Stay'. Cinematic pop with orchestral arrangements — glamorous, dramatic & utterly unique.",de:"Schweizer Electropop-Kollektiv Kadebostany in der Grellen Forelle! Bekannt für theatralische Performances & Hits wie 'Castle in the Snow'. Glamourös, dramatisch & einzigartig."},u:"grelleforelle.com",t:["concert","electropop","swiss","theatrical","grelle forelle"]},
{id:677,n:"BELOW THE SURFACE — RAW x YN",dt:"2026-03-14",c:"concert",v:"Grelle Forelle",p:"€15–20",desc:{en:"Deep techno night at Grelle Forelle: BELOW THE SURFACE brings RAW x YN for an evening of dark, hypnotic beats. Immersive soundscapes & relentless grooves on Vienna's best sound system.",de:"Deep-Techno-Nacht in der Grellen Forelle: BELOW THE SURFACE mit RAW x YN für einen Abend voller dunkler, hypnotischer Beats auf Wiens bestem Soundsystem."},u:"grelleforelle.com",t:["concert","techno","electronic","deep","grelle forelle"]},
{id:678,n:"Maxïmo Park — Live at Arena Wien",dt:"2026-03-15",c:"concert",v:"Arena Wien",p:"€35–42",desc:{en:"British indie rock heroes Maxïmo Park return to Vienna! Paul Smith & band bring angular guitars, synth hooks & post-punk energy. Hits like 'Apply Some Pressure' & 'Books from Boxes' from one of the UK's most consistent indie bands.",de:"Britische Indie-Rock-Helden Maxïmo Park zurück in Wien! Paul Smith & Band bringen kantige Gitarren, Synth-Hooks & Post-Punk-Energie. Einer der beständigsten Indie-Acts Großbritanniens."},u:"arena.wien",t:["concert","indie","post-punk","british","arena"]},
{id:679,n:"Pete Rock — Live at Flex",dt:"2026-03-15",c:"concert",v:"Flex",p:"€28–35",desc:{en:"Hip-hop production legend Pete Rock at Flex! One half of Pete Rock & CL Smooth, and producer behind classics for Nas, Public Enemy & Run-DMC. Soul-sampling genius & founding father of boom-bap. A masterclass in golden-age hip-hop.",de:"Hip-Hop-Produktionslegende Pete Rock im Flex! Eine Hälfte von Pete Rock & CL Smooth, Produzent für Nas, Public Enemy & Run-DMC. Meisterklasse im Golden-Age Hip-Hop."},u:"flex.at",t:["concert","hip-hop","producer","legendary","american","flex"]},
{id:680,n:"Austra — Live at Flex",dt:"2026-03-16",c:"concert",v:"Flex",p:"€25–32",desc:{en:"Canadian synth-pop/darkwave artist Austra (Katie Stelmanis) at Flex. Operatic vocals meet pulsing electronics — ethereal, intense & deeply emotional. Known for 'Lose It' & albums on Domino Records.",de:"Kanadische Synth-Pop/Darkwave-Künstlerin Austra (Katie Stelmanis) im Flex. Opernhafte Stimme trifft pulsierende Elektronik — ätherisch, intensiv & emotional."},u:"flex.at",t:["concert","synth-pop","darkwave","canadian","electronic","flex"]},
{id:681,n:"YIN YIN — Yatta Tour 2026",dt:"2026-03-19",c:"concert",v:"Grelle Forelle",p:"€22–28",desc:{en:"Dutch psychedelic disco-funk band YIN YIN at Grelle Forelle! Blending Southeast Asian melodies with krautrock, Italo-disco & cosmic synths. Infectious grooves, hypnotic rhythms & utterly danceable. Their 'Yatta' tour promises pure euphoria.",de:"Niederländische Psychedelic-Disco-Funk-Band YIN YIN in der Grellen Forelle! Südostasiatische Melodien treffen auf Krautrock, Italo-Disco & kosmische Synths. Ansteckende Grooves & pure Euphorie."},u:"grelleforelle.com",t:["concert","disco","funk","psychedelic","dutch","grelle forelle"]},
{id:682,n:"Peter Hook & The Light — Joy Division & New Order",dt:"2026-03-25",c:"concert",v:"Simm City",p:"€40–50",desc:{en:"🎸 Peter Hook — legendary bassist of Joy Division & New Order — performs classic albums with his band The Light at Simm City. 'Unknown Pleasures', 'Closer', 'Movement' & more played in full. Post-punk pilgrimage essential.",de:"🎸 Peter Hook — legendärer Bassist von Joy Division & New Order — mit seiner Band The Light im Simm City. 'Unknown Pleasures', 'Closer', 'Movement' & mehr. Post-Punk-Pilgerfahrt."},u:"simmcity.at",t:["concert","post-punk","legendary","joy division","new order","british"]},
{id:683,n:"Franz Ferdinand — Live at Gasometer",dt:"2026-03-29",c:"concert",v:"Gasometer",p:"€45–55",desc:{en:"🔥 Scottish art-rock heroes Franz Ferdinand headline Gasometer! Alex Kapranos & band bring two decades of angular indie anthems: 'Take Me Out', 'Do You Want To', 'This Fire'. Impeccable live energy & dancefloor-filling guitar rock.",de:"🔥 Schottische Art-Rock-Helden Franz Ferdinand im Gasometer! Alex Kapranos & Band mit zwei Jahrzehnten kantiger Indie-Hymnen: 'Take Me Out', 'Do You Want To', 'This Fire'. Perfekte Live-Energie."},u:"gasometer.at",t:["concert","indie","art rock","scottish","british","gasometer"]},

{id:741,n:"FLO — Akkordeon Festival at Sargfabrik",dt:"2026-03-05",c:"concert",v:"Sargfabrik",p:"€18–25",desc:{en:"Part of the 27th International Accordion Festival! FLO performs at Sargfabrik — creative accordion music pushing boundaries between folk, jazz & contemporary composition.",de:"Teil des 27. Internationalen Akkordeonfestivals! FLO in der Sargfabrik — kreative Akkordeonmusik zwischen Folk, Jazz & zeitgenössischer Komposition."},u:"akkordeonfestival.at",t:["concert","accordion","festival","folk","jazz","sargfabrik"]},
